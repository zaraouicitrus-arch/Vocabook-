<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000010"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>VocaBook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#000010;color:#e8f4ff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.5;}}
#aria-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}

/* DÉMARRAGE */
#start-screen{position:fixed;inset:0;z-index:1000;background:#000010;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:32px;cursor:pointer;}
.logo-icon{font-size:72px;filter:drop-shadow(0 0 30px #00e5ff);animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.logo-title{font-size:34px;letter-spacing:10px;color:#00e5ff;text-transform:uppercase;font-weight:100;text-align:center;}
.logo-sub{font-size:15px;color:#2a4060;text-align:center;line-height:1.7;max-width:300px;}
.tap-hint{font-size:16px;color:#c8a96e;border:1px solid #c8a96e;border-radius:20px;padding:16px 32px;animation:pgold 2s infinite;text-align:center;}
@keyframes pgold{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,0.4);}50%{box-shadow:0 0 0 14px rgba(200,169,110,0);}}

/* APP */
#app{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:#000010;}
#app.active{display:flex;}

/* ÉCRAN NOIR */
#dark-overlay{position:fixed;inset:0;z-index:500;background:#000000;display:none;align-items:center;justify-content:center;cursor:pointer;}
#dark-overlay.active{display:flex;}
#dark-overlay p{font-size:13px;color:#0a1a0a;text-align:center;padding:0 32px;}

/* ZONE ÉCOUTE */
#listen-zone{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;gap:22px;cursor:pointer;position:relative;z-index:1;}

/* CERCLE MIC */
#mic-circle{width:170px;height:170px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:60px;transition:all 0.3s;flex-shrink:0;}
#mic-circle.idle{background:radial-gradient(circle at 38% 32%,#001a2e,#000810);border:2px solid rgba(0,229,255,0.15);}
#mic-circle.listening{background:radial-gradient(circle at 38% 32%,#002a44,#000d20);border:2px solid rgba(0,229,255,0.7);box-shadow:0 0 0 16px rgba(0,229,255,0.06),0 0 70px rgba(0,229,255,0.35);animation:mplse 1s ease-in-out infinite;}
#mic-circle.speaking{background:radial-gradient(circle at 38% 32%,#2a1600,#100800);border:2px solid rgba(200,169,110,0.7);box-shadow:0 0 0 16px rgba(200,169,110,0.06),0 0 70px rgba(200,169,110,0.3);animation:mplseg 1.2s ease-in-out infinite;}
@keyframes mplse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes mplseg{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
#mic-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:700;}
#mic-circle.idle #mic-label{color:#1a3050;}
#mic-circle.listening #mic-label{color:#00e5ff;}
#mic-circle.speaking #mic-label{color:#c8a96e;}

#main-speech{font-size:18px;line-height:1.8;text-align:center;color:#e8f4ff;max-width:340px;min-height:72px;}
#commands-hint{font-size:13px;color:#1e3a5a;text-align:center;max-width:320px;line-height:2;border-top:1px solid rgba(0,229,255,0.06);padding-top:16px;width:100%;white-space:pre-line;}

/* BARRE LECTEUR */
#reader-bar{width:100%;background:rgba(0,0,16,0.98);border-top:1px solid rgba(0,229,255,0.08);padding:12px 20px 26px;display:none;flex-direction:column;gap:6px;flex-shrink:0;}
#reader-bar.visible{display:flex;}
#reader-book-title{font-size:12px;color:#00e5ff;letter-spacing:2px;text-transform:uppercase;text-align:center;}
#reader-chapter-info{font-size:11px;color:#1a3050;text-align:center;}
#reader-pb{height:3px;background:rgba(0,229,255,0.08);border-radius:2px;}
#reader-pf{height:100%;background:linear-gradient(90deg,#00e5ff,#c8a96e);transition:width 0.4s;border-radius:2px;width:0%;}
#reader-cmds{font-size:11px;color:#152840;text-align:center;margin-top:2px;}

/* TOAST */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,255,136,0.12);border:1px solid #00ff88;border-radius:20px;padding:10px 20px;font-size:13px;color:#00ff88;z-index:600;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>

</head>
<body>
<div id="aria-live" aria-live="assertive" aria-atomic="true"></div>
<div id="stars"></div>
<div class="toast" id="toast"></div>

<div id="dark-overlay" onclick="wakeScreen()">
  <p>Lecture en cours — touchez pour éclairer</p>
</div>

<div id="start-screen" onclick="startApp()">
  <div class="logo-icon">📖</div>
  <h1 class="logo-title">VocaBook</h1>
  <p class="logo-sub">Application de lecture audio pour personnes malvoyantes et aveugles</p>
  <div class="tap-hint">👆 Touchez l'écran une seule fois pour démarrer</div>
</div>

<div id="app">
  <div id="listen-zone" onclick="onTap()">
    <div id="mic-circle" class="idle">
      <span>🎙</span>
      <span id="mic-label">EN ATTENTE</span>
    </div>
    <p id="main-speech">…</p>
    <p id="commands-hint"></p>
  </div>
  <div id="reader-bar">
    <div id="reader-book-title"></div>
    <div id="reader-chapter-info"></div>
    <div id="reader-pb"><div id="reader-pf"></div></div>
    <div id="reader-cmds">LIRE · PAUSE · REPRENDRE · STOP · SUIVANT · PRÉCÉDENT · MARQUE-PAGE · ACCUEIL</div>
  </div>
</div>

<script>
// ÉTOILES
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<50;i++){
    var d=document.createElement('div');
    d.className='star';
    var sz=Math.random()*1.5+0.3;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-delay:'+Math.random()*4+'s;animation-duration:'+(2+Math.random()*4)+'s;';
    s.appendChild(d);
  }
})();

// VOIX
var synth = window.speechSynthesis;
var femaleVoice = null;
var isSpeaking = false;
var readSpeed = 0.88;
var currentMode = 'home';

function loadVoices(){
  var vs = synth.getVoices();
  var fr = vs.filter(function(v){ return v.lang.startsWith('fr'); });
  femaleVoice = fr.find(function(v){ return /amelie|marie|aurelie|celine|juliette|sophie|claire|google fr/i.test(v.name); }) || fr[0] || vs[0];
}
loadVoices();
synth.onvoiceschanged = loadVoices;

function speak(text, onEnd){
  document.getElementById('aria-live').textContent = text;
  document.getElementById('main-speech').textContent = text;
  synth.cancel();
  isSpeaking = true;
  setMicState('speaking');
  var u = new SpeechSynthesisUtterance(text);
  if(femaleVoice) u.voice = femaleVoice;
  u.rate = 0.87;
  u.pitch = 1.1;
  u.lang = femaleVoice ? femaleVoice.lang : 'fr-FR';
  u.onend = function(){
    isSpeaking = false;
    if(onEnd) onEnd();
    else startListening();
  };
  synth.speak(u);
}

function setMicState(state){
  var c = document.getElementById('mic-circle');
  var l = document.getElementById('mic-label');
  c.className = state;
  if(state==='idle') l.textContent = 'EN ATTENTE';
  else if(state==='listening') l.textContent = "J'ÉCOUTE…";
  else if(state==='speaking') l.textContent = 'JE PARLE…';
}

function showHint(text){ document.getElementById('commands-hint').textContent = text; }

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function onTap(){
  if(isSpeaking){ synth.cancel(); isSpeaking = false; startListening(); }
}

// RECONNAISSANCE VOCALE
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var isListening = false;
var recog = null;

function startListening(){
  if(!SR){ setMicState('idle'); showHint('Recherche vocale non disponible. Utilisez Chrome.'); return; }
  if(isListening || isSpeaking) return;
  isListening = true;
  setMicState('listening');
  recog = new SR();
  recog.lang = 'fr-FR';
  recog.interimResults = false;
  recog.maxAlternatives = 3;
  recog.onresult = function(e){
    isListening = false;
    var cmd = e.results[0][0].transcript.toLowerCase().trim();
    routeCommand(cmd);
  };
  recog.onerror = function(){
    isListening = false;
    setTimeout(startListening, 800);
  };
  recog.onend = function(){
    isListening = false;
    if(!isSpeaking && currentMode !== 'reading-active'){
      setTimeout(startListening, 500);
    }
  };
  try{ recog.start(); } catch(e){ isListening = false; }
}

function stopListening(){
  isListening = false;
  try{ if(recog) recog.stop(); } catch(e){}
}

// ROUTER PRINCIPAL
function routeCommand(cmd){
  // Commandes universelles
  if(/(stop|arrête|arrêter|silence)/.test(cmd)){
    speak('Lecture arrêtée.', function(){ stopRead(); startListening(); });
    return;
  }
  if(/(accueil|retour au menu|menu principal)/.test(cmd)){
    speak('Retour à l\'accueil.', function(){ welcomeHome(); });
    return;
  }

  // Selon le mode
  if(currentMode === 'home') handleHome(cmd);
  else if(currentMode === 'category') handleCategory(cmd);
  else if(currentMode === 'results') handleResults(cmd);
  else if(currentMode === 'confirm-book') handleConfirmBook(cmd);
  else if(currentMode === 'reader') handleReaderMenu(cmd);
  else if(currentMode === 'reading-active') handleReadingActive(cmd);
  else if(currentMode === 'ai') handleAI(cmd);
}

// DÉMARRAGE
function startApp(){
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadVoices();
  setTimeout(welcomeHome, 600);
}

// ACCUEIL
function welcomeHome(){
  currentMode = 'home';
  stopRead();
  document.getElementById('reader-bar').classList.remove('visible');
  document.getElementById('dark-overlay').classList.remove('active');
  var bm = getBookmark();
  var msg, hint;
  if(bm){
    msg = 'Bonjour. Tu es en mode aveugle. Tu as trois choix. '
        + 'Premier choix : reprendre la lecture du livre en cours. '
        + 'Deuxième choix : chercher un nouveau livre. '
        + 'Troisième choix : parler avec ton compagnon IA. '
        + 'Que veux-tu faire ?';
    hint = '1. REPRENDRE LA LECTURE DU LIVRE EN COURS\n2. CHERCHER UN NOUVEAU LIVRE\n3. COMPAGNON IA';
  } else {
    msg = 'Bonjour. Tu es en mode aveugle. Tu as deux choix. '
        + 'Premier choix : chercher un nouveau livre. '
        + 'Deuxième choix : parler avec ton compagnon IA. '
        + 'Que veux-tu faire ?';
    hint = '1. CHERCHER UN NOUVEAU LIVRE\n2. COMPAGNON IA';
  }
  showHint(hint);
  speak(msg);
}

function handleHome(cmd){
  if(/(reprendre la lecture|reprendre|reprend|continuer|continue|premier choix|choix un|choix 1|un$|1$)/.test(cmd)){
    doContinue();
    return;
  }
  if(/(chercher|cherche|nouveau livre|bibliothèque|trouver|deuxième choix|choix deux|choix 2|deux$|2$)/.test(cmd)){
    startBookSearch();
    return;
  }
  if(/(assistant|compagnon|IA|intelligence|troisième choix|choix trois|choix 3|trois$|3$)/.test(cmd)){
    startAI();
    return;
  }
  speak('Je n\'ai pas compris. Dis : reprendre la lecture du livre en cours, chercher un nouveau livre, ou compagnon IA.');
}

// REPRENDRE
function doContinue(){
  var bm = getBookmark();
  if(!bm){
    speak('Aucun livre en cours. Je vais te proposer de chercher un livre.', function(){ startBookSearch(); });
    return;
  }
  speak('Je charge ton livre. Un instant.', function(){
    var book = { id: bm.bookId, title: bm.title, author: bm.author, formats: bm.formats, text: bm.text };
    openBook(book, bm.chapterIdx, bm.wordIdx || 0);
  });
}

// RECHERCHE
function startBookSearch(){
  currentMode = 'home';
  speak('Quel livre ou auteur cherches-tu ? Parle maintenant.', function(){
    currentMode = 'category';
    startListening();
  });
  showHint('Dis un titre, un auteur, ou un genre');
}

function handleCategory(cmd){
  if(/(roman|classique|fiction)/.test(cmd)){ fetchBooks(null,'roman','Romans'); return; }
  if(/aventure/.test(cmd)){ fetchBooks(null,'aventure','Aventure'); return; }
  if(/policier|polar|détective/.test(cmd)){ fetchBooks(null,'policier','Policier'); return; }
  if(/philosophie/.test(cmd)){ fetchBooks(null,'philosophie','Philosophie'); return; }
  if(/poésie|poesie/.test(cmd)){ fetchBooks(null,'poesie','Poésie'); return; }
  if(/histoire/.test(cmd)){ fetchBooks(null,'histoire','Histoire'); return; }
  fetchBooks(cmd, null, cmd);
}

var searchResults = [];

function fetchBooks(query, topic, label){
  speak('Recherche en cours. Un instant.', function(){});
  var url = 'https://gutendex.com/books/?languages=fr,en&page_size=10';
  if(query) url += '&search=' + encodeURIComponent(query);
  if(topic) url += '&topic=' + encodeURIComponent(topic);
  fetch(url).then(function(r){ return r.json(); }).then(function(data){
    searchResults = (data.results||[]).map(function(b){
      return { id: b.id, title: b.title, author: (b.authors&&b.authors[0])?b.authors[0].name:'Auteur inconnu', formats: b.formats, summary: SUMMARIES[b.title]||null };
    });
    if(!searchResults.length) throw new Error('empty');
    currentMode = 'results';
    announceResults();
  }).catch(function(){
    var q = (query||'').toLowerCase();
    searchResults = q ? FALLBACK.filter(function(b){ return b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q); }) : FALLBACK;
    if(!searchResults.length) searchResults = FALLBACK;
    currentMode = 'results';
    announceResults();
  });
}

function announceResults(){
  var top = searchResults.slice(0,5);
  var msg = 'J\'ai trouvé ' + searchResults.length + ' livres. ';
  top.forEach(function(b,i){ msg += (i+1) + ' : ' + b.title + ' par ' + b.author + '. '; });
  msg += 'Dis le numéro du livre pour entendre un résumé.';
  var hint = '';
  top.forEach(function(b,i){ hint += (i+1) + '. ' + b.title + '\n'; });
  hint += '\nDis le numéro : UN, DEUX, TROIS…';
  showHint(hint);
  speak(msg);
}

function handleResults(cmd){
  var numMap = {'un':0,'une':0,'premier':0,'1':0,'deux':1,'deuxième':1,'2':1,'trois':2,'troisième':2,'3':2,'quatre':3,'quatrième':3,'4':3,'cinq':4,'cinquième':4,'5':4};
  for(var word in numMap){
    if(cmd.includes(word) && searchResults[numMap[word]]){
      describeBook(searchResults[numMap[word]]);
      return;
    }
  }
  if(/répète|liste/.test(cmd)){ announceResults(); return; }
  if(/cherche|autre/.test(cmd)){ startBookSearch(); return; }
  speak('Dis un numéro : un, deux, trois, quatre ou cinq. Ou dis répète pour réécouter la liste.');
}

// DESCRIPTION AVANT CHARGEMENT
var pendingBook = null;
function describeBook(book){
  var summary = book.summary || 'Un grand classique de la littérature française.';
  pendingBook = book;
  currentMode = 'confirm-book';
  var msg = book.title + ', par ' + book.author + '. ' + summary + '. Veux-tu écouter ce livre ? Dis OUI pour commencer ou NON pour en choisir un autre.';
  showHint('OUI pour écouter · NON pour choisir un autre');
  speak(msg);
}

function handleConfirmBook(cmd){
  if(/(oui|ok|yes|lancer|commencer|parfait|aller|d'accord)/.test(cmd)){
    speak('Très bien. Je charge le livre.', function(){ openBook(pendingBook, 0, 0); });
    return;
  }
  if(/(non|autre|changer|pas celui|différent)/.test(cmd)){
    speak('D\'accord. Voici la liste.', function(){ currentMode = 'results'; announceResults(); });
    return;
  }
  speak('Dis OUI pour écouter ce livre, ou NON pour en choisir un autre.');
}

// LECTEUR
var currentBook = null;
var currentChapters = [];
var currentChapterIdx = 0;
var currentWordIdx = 0;
var isPlaying = false;
var isPaused = false;
var progressTimer = null;

function openBook(book, startChapter, startWord){
  currentBook = book;
  currentChapterIdx = startChapter || 0;
  currentWordIdx = startWord || 0;
  isPlaying = false;
  isPaused = false;

  var text = book.text;

  if(!text && book.formats){
    var fmts = book.formats;
    var url = fmts['text/plain; charset=utf-8'] || fmts['text/plain; charset=us-ascii'] || fmts['text/plain'];
    if(!url){
      var keys = Object.keys(fmts);
      for(var k=0;k<keys.length;k++){
        if(keys[k].startsWith('text/plain')){ url = fmts[keys[k]]; break; }
      }
    }
    if(url){
      fetch('https://corsproxy.io/?' + encodeURIComponent(url)).then(function(r){ return r.text(); }).then(function(raw){
        var s = raw.indexOf('*** START OF');
        var e = raw.indexOf('*** END OF');
        if(s !== -1) raw = raw.slice(raw.indexOf('\n', s)+1);
        if(e !== -1) raw = raw.slice(0, e);
        text = raw.replace(/\r\n|\r/g,'\n').trim();
        currentBook.text = text;
        currentChapters = splitChapters(text);
        if(!currentChapters.length) currentChapters = [{title:'Lecture',text:text}];
        finishOpenBook(startChapter, startWord);
      }).catch(function(){
        useFallback(book, startChapter, startWord);
      });
      return;
    }
  }

  if(!text) useFallback(book, startChapter, startWord);
  else{
    currentBook.text = text;
    currentChapters = splitChapters(text);
    if(!currentChapters.length) currentChapters = [{title:'Lecture',text:text}];
    finishOpenBook(startChapter, startWord);
  }
}

function useFallback(book, startChapter, startWord){
  var fb = FALLBACK.find(function(f){ return f.title === book.title || f.id === book.id; });
  var text = fb ? fb.text : (book.title + ' par ' + book.author + '.');
  currentBook.text = text;
  currentChapters = splitChapters(text);
  if(!currentChapters.length) currentChapters = [{title:'Lecture',text:text}];
  finishOpenBook(startChapter, startWord);
}

function finishOpenBook(startChapter, startWord){
  currentChapterIdx = startChapter || 0;
  currentWordIdx = startWord || 0;
  document.getElementById('reader-bar').classList.add('visible');
  document.getElementById('reader-book-title').textContent = currentBook.title.toUpperCase();
  updateReaderBar();
  currentMode = 'reader';

  // Annoncer position exacte si reprise
  var ch = currentChapters[currentChapterIdx];
  var chName = ch ? (ch.title || ('Chapitre ' + (currentChapterIdx+1))) : 'Chapitre 1';
  var msg;

  if(currentWordIdx > 0 && ch){
    var words = ch.text.split(/\s+/);
    var snippet = words.slice(currentWordIdx, currentWordIdx+10).join(' ');
    msg = 'Ton livre est prêt. '
        + 'Tu reprends au ' + chName + '. '
        + 'Tu t\'étais arrêté sur ces mots : ' + snippet + '. '
        + 'Dis LIRE pour continuer exactement ici.';
  } else {
    msg = 'Ton livre est prêt. '
        + currentBook.title + ' par ' + currentBook.author + '. '
        + currentChapters.length + ' chapitre' + (currentChapters.length > 1 ? 's' : '') + '. '
        + 'Dis LIRE pour commencer depuis le début.';
  }

  showHint('LIRE · MARQUE-PAGE · SUIVANT · PRÉCÉDENT · ACCUEIL');
  speak(msg, function(){ startListening(); });
}

function updateReaderBar(){
  var ch = currentChapters[currentChapterIdx];
  document.getElementById('reader-chapter-info').textContent = (ch ? (ch.title || '') : '') + ' — Ch.' + (currentChapterIdx+1) + '/' + currentChapters.length;
}

function splitChapters(text){
  var patterns = [/\n\s*chapitre\s+\w+[.\s]/gi, /\n\s*chapter\s+\w+[.\s]/gi, /\n\s*livre\s+\w+[.\s]/gi];
  for(var p=0;p<patterns.length;p++){
    var parts = text.split(patterns[p]);
    if(parts.length > 2){
      var re = new RegExp(patterns[p].source, 'gi');
      var titles = [];
      var m;
      while((m = re.exec(text)) !== null) titles.push(m[0].trim());
      var chs = parts.slice(1).map(function(pt, i){ return {title: titles[i]||('Chapitre '+(i+1)), text: pt.trim()}; }).filter(function(c){ return c.text.length > 50; });
      if(chs.length > 1) return chs;
    }
  }
  var words = text.split(/\s+/);
  var chunks = [];
  for(var i=0;i<words.length;i+=1800){
    chunks.push({title:'Partie '+(Math.floor(i/1800)+1), text: words.slice(i,i+1800).join(' ')});
  }
  return chunks;
}

function handleReaderMenu(cmd){
  if(/(lire|lis|lancer|commencer|play|démarrer)/.test(cmd)){
    speak('Je commence la lecture.', function(){ startRead(); });
    return;
  }
  if(/(marque|signet|bookmark)/.test(cmd)){
    speak('Marque-page enregistré.', function(){ saveBookmark(); startListening(); });
    return;
  }
  if(/(suivant|chapitre suivant)/.test(cmd)){
    speak('Chapitre suivant.', function(){ nextChapter(); });
    return;
  }
  if(/(précédent|chapitre précédent)/.test(cmd)){
    speak('Chapitre précédent.', function(){ prevChapter(); });
    return;
  }
  if(/(progression|où en suis|avancement)/.test(cmd)){
    announceProgress();
    return;
  }
  speak('Dis LIRE pour commencer, ou ACCUEIL pour revenir au menu.');
}

function handleReadingActive(cmd){
  if(/(pause|pauser|arrête de lire)/.test(cmd)){
    speak('Mise en pause.', function(){ pauseRead(); });
    return;
  }
  if(/(stop|arrête|silence)/.test(cmd)){
    speak('Lecture arrêtée.', function(){ stopRead(); currentMode = 'reader'; startListening(); });
    return;
  }
  if(/(suivant|chapitre suivant)/.test(cmd)){
    speak('Chapitre suivant.', function(){ nextChapter(); });
    return;
  }
  if(/(précédent|chapitre précédent)/.test(cmd)){
    speak('Chapitre précédent.', function(){ prevChapter(); });
    return;
  }
  if(/(marque|signet|bookmark)/.test(cmd)){
    speak('Marque-page enregistré.', function(){ saveBookmark(); setTimeout(listenDuringRead, 500); });
    return;
  }
  if(/(plus vite|rapide|accélérer)/.test(cmd)){
    readSpeed = 1.3;
    speak('Lecture rapide.', function(){ stopRead(); startRead(); });
    return;
  }
  if(/(plus lentement|lentement|lent|ralentir)/.test(cmd)){
    readSpeed = 0.7;
    speak('Lecture lente.', function(){ stopRead(); startRead(); });
    return;
  }
  if(/(vitesse normale|normal)/.test(cmd)){
    readSpeed = 0.88;
    speak('Vitesse normale.', function(){ stopRead(); startRead(); });
    return;
  }
  if(/(progression|où en suis|avancement)/.test(cmd)){
    announceProgress();
    return;
  }
}

function startRead(){
  var ch = currentChapters[currentChapterIdx];
  if(!ch) return;
  synth.cancel();
  stopListening();
  currentMode = 'reading-active';
  isPlaying = true;
  isPaused = false;

  var allWords = ch.text.split(/\s+/);
  var startText = currentWordIdx > 0 ? allWords.slice(currentWordIdx).join(' ') : ch.text;

  var u = new SpeechSynthesisUtterance(startText);
  if(femaleVoice) u.voice = femaleVoice;
  u.rate = readSpeed;
  u.pitch = 1.08;
  u.lang = femaleVoice ? femaleVoice.lang : 'fr-FR';

  u.onboundary = function(e){
    if(e.name === 'word'){
      currentWordIdx++;
      var pct = Math.round(currentWordIdx / allWords.length * 100);
      document.getElementById('reader-pf').style.width = pct + '%';
    }
  };

  u.onend = function(){
    isPlaying = false;
    isPaused = false;
    clearInterval(progressTimer);
    if(currentChapterIdx < currentChapters.length-1){
      currentChapterIdx++;
      currentWordIdx = 0;
      updateReaderBar();
      document.getElementById('reader-pf').style.width = '0%';
      wakeScreen();
      currentMode = 'reader';
      speak('Chapitre ' + currentChapterIdx + ' terminé. Chapitre ' + (currentChapterIdx+1) + ' : ' + (currentChapters[currentChapterIdx].title||'') + '. Dis LIRE pour continuer.');
    } else {
      wakeScreen();
      speak('Livre terminé. Félicitations ! Retour à l\'accueil.', function(){ welcomeHome(); });
    }
  };

  synth.speak(u);
  isSpeaking = false;
  setMicState('listening');
  document.getElementById('main-speech').textContent = 'Lecture : ' + (ch.title||'');
  showHint('PAUSE · STOP · SUIVANT · MARQUE-PAGE · PROGRESSION');

  // Écran noir après 15 secondes
  setTimeout(function(){ if(isPlaying) document.getElementById('dark-overlay').classList.add('active'); }, 15000);

  // Progression toutes les 10 minutes
  clearInterval(progressTimer);
  progressTimer = setInterval(function(){
    if(isPlaying && !isPaused){
      var pct = Math.round(currentWordIdx / allWords.length * 100);
      synth.pause();
      var u2 = new SpeechSynthesisUtterance('Chapitre ' + (currentChapterIdx+1) + ' sur ' + currentChapters.length + '. ' + pct + ' pourcent du chapitre.');
      if(femaleVoice) u2.voice = femaleVoice;
      u2.rate = 0.9; u2.pitch = 1.1;
      u2.onend = function(){ synth.resume(); };
      synth.speak(u2);
    }
  }, 600000);

  setTimeout(listenDuringRead, 1000);
}

function listenDuringRead(){
  if(!isPlaying || !SR) return;
  var r = new SR();
  r.lang = 'fr-FR'; r.interimResults = false; r.maxAlternatives = 1;
  r.onresult = function(e){
    var cmd = e.results[0][0].transcript.toLowerCase();
    routeCommand(cmd);
  };
  r.onend = function(){ if(isPlaying) setTimeout(listenDuringRead, 500); };
  try{ r.start(); } catch(e){}
}

function pauseRead(){
  synth.pause();
  isPaused = true;
  isPlaying = false;
  clearInterval(progressTimer);
  currentMode = 'reader';
  wakeScreen();
  showHint('REPRENDRE · STOP · ACCUEIL');
  setTimeout(startListening, 500);
}

function resumeRead(){
  synth.resume();
  isPaused = false;
  isPlaying = true;
  currentMode = 'reading-active';
  setMicState('listening');
  isSpeaking = false;
  document.getElementById('main-speech').textContent = 'Lecture en cours…';
  showHint('PAUSE · STOP · SUIVANT · MARQUE-PAGE');
  setTimeout(function(){ if(isPlaying) document.getElementById('dark-overlay').classList.add('active'); }, 15000);
  setTimeout(listenDuringRead, 500);
}

function stopRead(){
  synth.cancel();
  isPlaying = false;
  isPaused = false;
  isSpeaking = false;
  clearInterval(progressTimer);
  wakeScreen();
}

function nextChapter(){
  if(currentChapterIdx < currentChapters.length-1){
    stopRead();
    currentChapterIdx++;
    currentWordIdx = 0;
    updateReaderBar();
    document.getElementById('reader-pf').style.width = '0%';
    currentMode = 'reader';
    var ch = currentChapters[currentChapterIdx];
    speak('Chapitre ' + (currentChapterIdx+1) + ' : ' + (ch.title||'') + '. Dis LIRE pour commencer.');
  } else {
    speak('C\'est le dernier chapitre.');
  }
}

function prevChapter(){
  if(currentChapterIdx > 0){
    stopRead();
    currentChapterIdx--;
    currentWordIdx = 0;
    updateReaderBar();
    document.getElementById('reader-pf').style.width = '0%';
    currentMode = 'reader';
    var ch = currentChapters[currentChapterIdx];
    speak('Chapitre ' + (currentChapterIdx+1) + ' : ' + (ch.title||'') + '. Dis LIRE pour commencer.');
  } else {
    speak('C\'est le premier chapitre.');
  }
}

function announceProgress(){
  if(!currentBook){ speak('Aucune lecture en cours.'); return; }
  var ch = currentChapters[currentChapterIdx];
  var total = ch ? ch.text.split(/\s+/).length : 1;
  var pct = Math.round(currentWordIdx / total * 100);
  speak('Tu es au chapitre ' + (currentChapterIdx+1) + ' sur ' + currentChapters.length + ', à ' + pct + ' pourcent du chapitre en cours.');
}

function wakeScreen(){
  document.getElementById('dark-overlay').classList.remove('active');
}

// MARQUE-PAGE
function getBookmark(){
  try{ return JSON.parse(localStorage.getItem('vb_bm')); } catch(e){ return null; }
}

function saveBookmark(){
  if(!currentBook) return;
  var bm = {
    bookId: currentBook.id,
    title: currentBook.title,
    author: currentBook.author,
    chapterIdx: currentChapterIdx,
    wordIdx: currentWordIdx,
    formats: currentBook.formats || null,
    text: currentBook.text || null,
    savedAt: new Date().toLocaleDateString('fr-FR')
  };
  localStorage.setItem('vb_bm', JSON.stringify(bm));
  showToast('🔖 Marque-page enregistré !');
  var ch = currentChapters[currentChapterIdx];
  var total = ch ? ch.text.split(/\s+/).length : 1;
  var pct = Math.round(currentWordIdx / total * 100);
  speak('Marque-page enregistré. ' + (ch ? (ch.title||'Chapitre '+(currentChapterIdx+1)) : '') + ', à ' + pct + ' pourcent. Tu reprendras exactement ici.');
}

function startAI(){
  currentMode = 'ai';
  speak('Bonjour, je suis ton compagnon IA. Pose-moi ta question.', function(){ startListening(); });
  showHint('Pose ta question à voix haute');
}

function handleAI(cmd){
  var lower = cmd.toLowerCase();
  var resp = null;
  for(var i=0;i<AI_KB.length;i++){
    var found = false;
    for(var j=0;j<AI_KB[i].k.length;j++){
      if(lower.includes(AI_KB[i].k[j])){ found = true; break; }
    }
    if(found){ resp = AI_KB[i].r; break; }
  }
  if(!resp) resp = 'Je n\'ai pas bien compris. Tu peux me demander une recommandation de livre, des infos sur un auteur, ou comment utiliser VocaBook.';
  speak(resp, function(){ currentMode = 'ai'; showHint('Pose une autre question ou dis ACCUEIL'); startListening(); });
}
