<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>VocaBook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  background:#0A0A0A;
  color:#F5F5F0;
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── ÉCRAN DÉMARRAGE : TOUT L’ÉCRAN EST LE BOUTON ── */
#screen-start{
position:fixed;inset:0;
background:#0A0A0A;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
gap:28px;padding:40px;
cursor:pointer;
z-index:999;
}
#screen-start .ico{ font-size:120px; }
#screen-start h1{
font-size:42px;font-weight:900;
color:#D4A017;
}
#screen-start p{
font-size:22px;line-height:1.9;
color:#F5F5F0;text-align:center;
font-weight:600;
}
#screen-start .hint{
font-size:18px;color:#9A9A94;
margin-top:4px;
}

/* ── APP PRINCIPALE ── */
#screen-app{
display:none;
position:fixed;inset:0;
flex-direction:column;
align-items:center;justify-content:space-between;
padding:44px 28px calc(env(safe-area-inset-bottom)+24px);
text-align:center;
}

/* BANNIÈRE VOCALE */
#banner{
position:fixed;top:-130px;left:50%;
transform:translateX(-50%);
background:#1C1C1C;border:2px solid #D4A017;
border-radius:16px;padding:16px 22px;
font-size:18px;font-weight:700;color:#D4A017;
z-index:9999;max-width:92%;text-align:center;
transition:top 0.3s ease;line-height:1.6;
pointer-events:none;
box-shadow:0 8px 32px rgba(0,0,0,0.95);
}
#banner.show{top:20px;}

/* ICÔNE LIVRE */
#book-ico{
width:160px;height:160px;
background:#1C1C1C;border:3px solid #2A2A2A;
border-radius:28px;display:flex;
align-items:center;justify-content:center;
font-size:68px;transition:box-shadow 0.5s;
flex-shrink:0;
}
#book-ico.pl{
box-shadow:0 0 0 14px rgba(212,160,23,0.25),
0 20px 60px rgba(0,0,0,0.6);
}

/* TITRE / AUTEUR */
#book-ttl{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:6px;padding:0 4px;}
#book-aut{font-size:15px;color:#9A9A94;margin-bottom:2px;}
#book-dur{font-size:13px;color:#9A9A94;}

/* PROGRESSION */
.pw{width:100%;}
.ptrack{height:14px;background:#2A2A2A;border-radius:7px;position:relative;}
.pfill{position:absolute;left:0;top:0;bottom:0;background:#D4A017;border-radius:7px;transition:width 0.3s;}
.pthumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#D4A017;border-radius:50%;box-shadow:0 0 0 4px #0A0A0A;}
#pinfo{display:flex;justify-content:space-between;margin-top:8px;font-size:14px;color:#9A9A94;font-weight:700;}
.gold{color:#D4A017;}

/* INDICATEUR MICRO CONTINU */
#mic-status{
display:flex;flex-direction:column;
align-items:center;justify-content:center;
gap:10px;
}
#mic-ring{
width:120px;height:120px;
border-radius:50%;
background:#1C1C1C;
border:4px solid #2A2A2A;
display:flex;align-items:center;justify-content:center;
font-size:48px;
transition:all 0.3s;
flex-shrink:0;
}
#mic-ring.listening{
border-color:#D4A017;
background:#1C1C1C;
box-shadow:0 0 0 0 rgba(212,160,23,0.6);
animation:micpulse 1.4s infinite;
}
#mic-ring.speaking{
border-color:#D4A017;
background:#D4A017;
}
@keyframes micpulse{
0%  {box-shadow:0 0 0 0 rgba(212,160,23,0.6);}
70% {box-shadow:0 0 0 22px rgba(212,160,23,0);}
100%{box-shadow:0 0 0 0 rgba(212,160,23,0);}
}
#mic-label{
font-size:15px;font-weight:700;color:#9A9A94;
min-height:22px;text-align:center;
}
</style>

</head>
<body>

<div id="banner" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- ÉCRAN DÉMARRAGE — TOUT L'ÉCRAN EST CLIQUABLE -->

<div id="screen-start" role="button" aria-label="Toucher n'importe où pour démarrer">
  <div class="ico">🎧</div>
  <h1>VocaBook</h1>
  <p>Bibliothèque audio<br/>entièrement vocale</p>
  <p class="hint">Poser le doigt n'importe où<br/>pour démarrer</p>
</div>

<!-- APP PRINCIPALE -->

<div id="screen-app">

  <div id="book-ico">🎧</div>

  <div style="width:100%">
    <p id="book-ttl">VocaBook</p>
    <p id="book-aut">Bibliothèque vocale</p>
    <p id="book-dur"></p>
  </div>

  <div class="pw">
    <div class="ptrack">
      <div class="pfill" id="pfill" style="width:0%"></div>
      <div class="pthumb" id="pthumb" style="left:0%"></div>
    </div>
    <div id="pinfo">
      <span id="p-el">0min</span>
      <span class="gold" id="p-pct">0%</span>
      <span id="p-tot">--</span>
    </div>
  </div>

  <!-- Indicateur micro — pas de bouton, juste un état visuel -->

  <div id="mic-status">
    <div id="mic-ring">🎤</div>
    <p id="mic-label">Initialisation…</p>
  </div>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════
// VOIX
// ══════════════════════════════════════════════════════
let speaking    = false;
let currentRate = 1;

function say(text, onEnd) {
  // Bannière
  const b = document.getElementById('banner');
  b.textContent = text.length > 75 ? text.slice(0,72)+'…' : text;
  b.classList.add('show');
  clearTimeout(say._bt);
  say._bt = setTimeout(() => b.classList.remove('show'), 7000);

  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();
  speaking = false;
  stopListening(); // on écoute pas pendant qu'on parle

  setMicState('speaking');

  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang    = 'fr-FR';
    u.rate    = currentRate;
    u.volume  = 1;
    u.onend   = () => {
      speaking = false;
      setMicState('idle');
      if (onEnd) onEnd();
      else startListening(); // reprend l'écoute automatiquement
    };
    u.onerror = () => {
      speaking = false;
      setMicState('idle');
      if (onEnd) onEnd();
      else startListening();
    };
    speaking = true;
    window.speechSynthesis.speak(u);

    // iOS keepalive
    clearInterval(say._kp);
    say._kp = setInterval(() => {
      if (!speaking) { clearInterval(say._kp); return; }
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 5000);
  }, 80);
}

// ══════════════════════════════════════════════════════
// MICRO CONTINU
// ══════════════════════════════════════════════════════
let recog     = null;
let listening = false;

function initRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setMicLabel('Micro non disponible');
    return false;
  }

  recog = new SR();
  recog.lang            = 'fr-FR';
  recog.continuous      = false;  // iOS ne supporte pas continuous=true
  recog.interimResults  = false;
  recog.maxAlternatives = 3;

  recog.onstart = () => {
    listening = true;
    setMicState('listening');
    setMicLabel('Je vous écoute…');
  };

  recog.onend = () => {
    listening = false;
    if (!speaking) {
      // Relance automatiquement l'écoute après 500ms
      setTimeout(() => {
        if (!speaking) startListening();
      }, 500);
    }
  };

  recog.onerror = (e) => {
    listening = false;
    if (e.error === 'no-speech') {
      // Silence — relance l'écoute silencieusement
      if (!speaking) setTimeout(() => startListening(), 300);
      return;
    }
    if (e.error === 'aborted') return;
    // Erreur réseau ou autre
    setTimeout(() => { if (!speaking) startListening(); }, 1000);
  };

  recog.onresult = (e) => {
    const cmd = e.results[0][0].transcript.toLowerCase().trim();
    setMicLabel('« ' + cmd + ' »');
    handleCommand(cmd);
  };

  return true;
}

function startListening() {
  if (!recog || speaking || listening) return;
  try {
    recog.start();
  } catch(e) {
    setTimeout(() => {
      try { recog.start(); } catch(e2) {}
    }, 300);
  }
}

function stopListening() {
  if (!recog || !listening) return;
  try { recog.abort(); } catch(e) {}
  listening = false;
}

function setMicState(state) {
  const ring = document.getElementById('mic-ring');
  ring.classList.remove('listening','speaking');
  if (state === 'listening') { ring.classList.add('listening'); setMicLabel('Je vous écoute…'); }
  if (state === 'speaking')  { ring.classList.add('speaking');  setMicLabel('VocaBook parle…'); }
  if (state === 'idle')      { setMicLabel(''); }
}

function setMicLabel(txt) {
  document.getElementById('mic-label').textContent = txt;
}

// ══════════════════════════════════════════════════════
// ÉTAT APP
// ══════════════════════════════════════════════════════
let books       = [];
let libOk       = false;
let book        = null;
let playing     = false;
let prog        = 0;
let progIv      = null;
let sleepTO     = null;
let bookmarks   = [];
let convMode    = 'idle'; // 'idle' | 'ask_book' | 'confirm_book'
let pendingBook = null;

const SPEEDS = [0.5,0.75,1,1.25,1.5,1.75,2,2.5,3];
const SNAMES = {
  0.5:'moitié de vitesse', 0.75:'trois quarts de vitesse',
  1:'vitesse normale',     1.25:'un peu plus vite',
  1.5:'une fois et demie', 1.75:'presque deux fois plus vite',
  2:'deux fois plus vite', 2.5:'deux fois et demie',
  3:'trois fois plus vite'
};
const GENRES = {
  'aventure':['adventure','action'],
  'roman':['fiction','novel'],
  'amour':['romance','love'],
  'mystère':['mystery','detective','crime'],
  'histoire':['history','historical'],
  'philosophie':['philosophy'],
  'science':['science'],
  'poésie':['poetry','poem'],
  'biographie':['biography'],
  'théâtre':['drama'],
  'humour':['humour','comedy'],
  'classique':['fiction','classic'],
};
const GICO={fiction:'📖',romance:'💕',adventure:'⚔️',mystery:'🔍',poetry:'🌸',history:'🏛️',philosophy:'🧠',science:'🔬',biography:'👤',drama:'🎭',humour:'😄'};

function gico(g){
  if(!g||!g.length) return '🎧';
  const n=(g[0]?.name||'').toLowerCase();
  for(const[k,v] of Object.entries(GICO)) if(n.includes(k)) return v;
  return '🎧';
}
function fmtS(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  return h>0?`${h}h ${String(m).padStart(2,'0')}min`:`${m}min`;
}
function fmtL(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0) return `${h} heure${h>1?'s':''} et ${m} minute${m!==1?'s':''}`;
  return `${m} minute${m!==1?'s':''}`;
}

// ══════════════════════════════════════════════════════
// DÉMARRAGE — premier toucher n'importe où
// ══════════════════════════════════════════════════════
document.getElementById('screen-start').addEventListener('click', function() {
  // Cache l'écran de démarrage
  this.style.display = 'none';
  document.getElementById('screen-app').style.display = 'flex';

  // Initialise le micro dans le handler du click — iOS autorise
  const micOk = initRecog();

  // Parle IMMÉDIATEMENT — iOS autorise car on est dans le handler
  say(
    'Bienvenue dans VocaBook. ' +
    'Je charge votre bibliothèque de livres audio en français. ' +
    'Un instant.',
    () => loadLib()
  );
}, { once: true });

// ══════════════════════════════════════════════════════
// CHARGEMENT LIBRIVOX
// ══════════════════════════════════════════════════════
async function loadLib() {
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent(
      'https://librivox.org/api/feed/audiobooks/?language=french&limit=100&offset=0&format=json'
    );
    const r = await fetch(url);
    const d = await r.json();
    books = (d.books||[]).map(b => ({
      id:     b.id,
      title:  (b.title||'').trim() || 'Sans titre',
      author: (b.authors||[]).map(a=>`${a.first_name} ${a.last_name}`.trim()).join(', ') || 'Auteur inconnu',
      secs:   parseInt(b.totaltimesecs||0),
      dur:    b.totaltime || '',
      icon:   gico(b.genres),
      genres: (b.genres||[]).map(g=>(g.name||'').toLowerCase()),
    }));
    libOk = true;
    askWhatBook();
  } catch(e) {
    say('Impossible de charger les livres. Vérifiez votre connexion internet.',
      () => setTimeout(() => loadLib(), 5000)
    );
  }
}

// ══════════════════════════════════════════════════════
// CONVERSATION — DEMANDE DU LIVRE
// ══════════════════════════════════════════════════════
function askWhatBook() {
  convMode = 'ask_book';
  document.getElementById('book-ico').textContent = '🎧';
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = 'Quel livre ?';
  document.getElementById('book-aut').textContent = '';
  document.getElementById('book-dur').textContent = '';
  say(
    'Quel livre voulez-vous écouter ? ' +
    'Dites le titre ou le nom de l\'auteur. ' +
    'Ou dites un genre : aventure, roman, mystère, histoire, poésie, amour, humour, philosophie, biographie. ' +
    'Je vous propose un livre.'
    // après say() → le micro reprend automatiquement
  );
}

// ══════════════════════════════════════════════════════
// RECHERCHE
// ══════════════════════════════════════════════════════
function searchBook(q) {
  const query = q.toLowerCase();
  return books.find(b =>
    b.title.toLowerCase().includes(query) ||
    b.author.toLowerCase().includes(query)
  ) || null;
}

function searchByGenre(q) {
  const query = q.toLowerCase();
  let keywords = [];
  for (const [fr, en] of Object.entries(GENRES)) {
    if (query.includes(fr)) { keywords = en; break; }
  }
  if (!keywords.length) return null;
  const results = books.filter(b =>
    b.genres.some(g => keywords.some(k => g.includes(k)))
  );
  if (!results.length) return null;
  // Livre aléatoire parmi les résultats
  return results[Math.floor(Math.random() * Math.min(results.length, 5))];
}

function proposeBook(b) {
  pendingBook = b;
  convMode    = 'confirm_book';
  document.getElementById('book-ico').textContent = b.icon;
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = b.title;
  document.getElementById('book-aut').textContent = b.author;
  document.getElementById('book-dur').textContent = b.dur ? '⏱ '+b.dur : '';
  say(
    `J'ai trouvé : ${b.title}, par ${b.author}. ` +
    `Durée : ${b.dur||fmtL(b.secs)}. ` +
    `Dites oui pour écouter ce livre. Dites non pour chercher un autre.`
  );
}

// ══════════════════════════════════════════════════════
// LECTURE
// ══════════════════════════════════════════════════════
function playBook(b) {
  book=b; prog=0; playing=false; bookmarks=[];
  convMode='idle';
  document.getElementById('book-ico').textContent = b.icon;
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = b.title;
  document.getElementById('book-aut').textContent = b.author;
  document.getElementById('book-dur').textContent = b.dur || fmtS(b.secs);
  document.getElementById('p-tot').textContent    = b.dur || fmtS(b.secs);
  updateProg();
  say(
    `Vous avez choisi ${b.title} par ${b.author}. ` +
    `Durée : ${b.dur||fmtL(b.secs)}. La lecture commence. ` +
    `Dites pause pour mettre en pause. ` +
    `Dites marque-page pour sauvegarder votre position. ` +
    `Dites où en suis-je pour votre avancement. ` +
    `Dites aide pour toutes les commandes.`,
    () => {
      playing = true;
      document.getElementById('book-ico').classList.add('pl');
      startProg();
      startListening(); // reprend l'écoute
    }
  );
}

function resumePlay() {
  if (!book) { askWhatBook(); return; }
  if (playing) { say('La lecture est déjà en cours.'); return; }
  playing = true;
  document.getElementById('book-ico').classList.add('pl');
  startProg();
  say('Reprise de la lecture.');
}

function pausePlay() {
  if (!playing) { say('Déjà en pause. Dites reprendre pour continuer.'); return; }
  playing = false;
  clearInterval(progIv);
  document.getElementById('book-ico').classList.remove('pl');
  say('Pause. Dites reprendre pour continuer.');
}

function startProg() {
  clearInterval(progIv);
  progIv = setInterval(() => {
    if (!playing) return;
    prog = Math.min(100, prog + 0.04);
    updateProg();
    if (prog >= 100) {
      playing = false;
      clearInterval(progIv);
      document.getElementById('book-ico').classList.remove('pl');
      say(
        'La lecture est terminée. Bravo ! ' +
        'Dites nouveau livre pour en choisir un autre.',
        () => { convMode = 'ask_book'; }
      );
    }
  }, 300);
}

function updateProg() {
  const p  = Math.round(prog);
  const el = Math.round((p/100) * (book?.secs||0));
  document.getElementById('pfill').style.width   = p+'%';
  document.getElementById('pthumb').style.left   = p+'%';
  document.getElementById('p-pct').textContent   = p+'%';
  document.getElementById('p-el').textContent    = fmtS(el);
}

// ══════════════════════════════════════════════════════
// MARQUE-PAGES
// ══════════════════════════════════════════════════════
function addBookmark() {
  if (!book) { say('Aucun livre en cours.'); return; }
  const secs = Math.round((prog/100) * (book.secs||0));
  const n    = bookmarks.length + 1;
  bookmarks.push({ pct: Math.round(prog), secs, n });
  say(`Marque-page ${n} sauvegardé à ${fmtL(secs)}.`);
}

function listBookmarks() {
  if (!bookmarks.length) {
    say('Aucun marque-page. Dites marque-page pendant la lecture pour en créer un.');
    return;
  }
  const liste = bookmarks.map(bm => `Marque-page ${bm.n} à ${fmtL(bm.secs)}`).join('. ');
  say(
    `Vous avez ${bookmarks.length} marque-page${bookmarks.length>1?'s':''}. ` +
    liste + '. ' +
    'Dites reprendre marque-page 1, ou 2, pour y retourner.'
  );
}

function gotoBookmark(n) {
  const bm = bookmarks.find(b => b.n === n);
  if (!bm) { say(`Marque-page ${n} introuvable.`); return; }
  prog = bm.pct;
  updateProg();
  say(
    `Reprise au marque-page ${n}, à ${fmtL(bm.secs)}.`,
    () => {
      playing = true;
      document.getElementById('book-ico').classList.add('pl');
      startProg();
      startListening();
    }
  );
}

// ══════════════════════════════════════════════════════
// VITESSE
// ══════════════════════════════════════════════════════
function speedUp() {
  const i = SPEEDS.indexOf(currentRate);
  if (i >= SPEEDS.length-1) { say('Vitesse maximale atteinte : trois fois plus vite.'); return; }
  currentRate = SPEEDS[i+1];
  say(`Vitesse augmentée : ${SNAMES[currentRate]}.`);
}
function speedDown() {
  const i = SPEEDS.indexOf(currentRate);
  if (i <= 0) { say('Vitesse minimale atteinte : moitié de vitesse.'); return; }
  currentRate = SPEEDS[i-1];
  say(`Vitesse réduite : ${SNAMES[currentRate]}.`);
}

// ══════════════════════════════════════════════════════
// POSITION
// ══════════════════════════════════════════════════════
function whereAmI() {
  if (!book) { say('Aucun livre en cours.'); return; }
  const secs  = Math.round((prog/100) * (book.secs||0));
  const reste = (book.secs||0) - secs;
  say(
    `Vous êtes à ${Math.round(prog)} pourcent de ${book.title}. ` +
    `Vous avez écouté ${fmtL(secs)}. ` +
    `Il reste environ ${fmtL(reste)}.`
  );
}

// ══════════════════════════════════════════════════════
// MINUTERIE
// ══════════════════════════════════════════════════════
function setSleep(min) {
  clearTimeout(sleepTO);
  sleepTO = setTimeout(() => {
    playing = false;
    clearInterval(progIv);
    document.getElementById('book-ico').classList.remove('pl');
    sleepTO = null;
    say('Bonne nuit. La lecture s\'est arrêtée automatiquement. Votre position est sauvegardée.');
  }, min * 60000);
  say(`Arrêt automatique dans ${min} minutes. Bonne nuit.`);
}

// ══════════════════════════════════════════════════════
// AIDE
// ══════════════════════════════════════════════════════
function sayHelp() {
  say(
    'Voici toutes les commandes. ' +
    'Pour choisir un livre : dites le titre, le nom de l\'auteur, ou un genre comme aventure, roman, mystère, histoire, poésie, amour, humour, philosophie. ' +
    'Pendant la lecture : dites pause pour mettre en pause. ' +
    'Dites reprendre pour continuer. ' +
    'Dites reculer pour revenir trente secondes en arrière. ' +
    'Dites avancer pour sauter trente secondes. ' +
    'Dites marque-page pour sauvegarder votre position. ' +
    'Dites mes marque-pages pour les écouter. ' +
    'Dites reprendre marque-page 1 pour y retourner. ' +
    'Dites où en suis-je pour connaître votre avancement. ' +
    'Dites plus vite pour accélérer. ' +
    'Dites moins vite pour ralentir. ' +
    'Dites arrêt dans 30 minutes pour la minuterie de sommeil. ' +
    'Dites nouveau livre pour changer de livre.'
  );
}

// ══════════════════════════════════════════════════════
// COMMANDES VOCALES
// ══════════════════════════════════════════════════════
function handleCommand(cmd) {

  // Marque-page numéroté : "reprendre marque-page 2"
  const bmM = cmd.match(/(?:reprendre|aller|retourner).*marque[- ]?page\s*(\d+)/);
  if (bmM) { gotoBookmark(parseInt(bmM[1])); return; }

  // ── MODE CONFIRMATION ──
  if (convMode === 'confirm_book') {
    if (/^(oui|ok|yes|parfait|bien|super|d.accord|lancer|écouter|démarrer|vas-y|allez)/.test(cmd)) {
      playBook(pendingBook); return;
    }
    if (/^(non|pas|autre|différent|changer|suivant)/.test(cmd)) {
      pendingBook = null; askWhatBook(); return;
    }
    // Traite comme nouvelle recherche
  }

  // ── MODE DEMANDE LIVRE ──
  if (convMode === 'ask_book') {
    // Genre ?
    const genreFound = Object.keys(GENRES).find(g => cmd.includes(g));
    if (genreFound) {
      const found = searchByGenre(cmd);
      if (found) { proposeBook(found); return; }
      say(`Je n'ai pas trouvé de livre de genre ${genreFound}. Essayez un autre genre ou dites un titre.`);
      return;
    }
    // Titre ou auteur ?
    if (cmd.length > 2) {
      const found = searchBook(cmd);
      if (found) { proposeBook(found); return; }
      say(`Je n'ai pas trouvé "${cmd}". Dites un autre titre, un auteur, ou un genre.`);
      return;
    }
  }

  // ── COMMANDES UNIVERSELLES ──
  if (/nouveau livre|autre livre|changer de livre/.test(cmd)) {
    if (playing) pausePlay();
    askWhatBook(); return;
  }
  if (/\bpause\b|^stop$|arrêter|arrête/.test(cmd))  { pausePlay(); return; }
  if (/reprendre|continuer/.test(cmd))               { resumePlay(); return; }
  if (/reculer|recule/.test(cmd)) {
    if (!book) { say('Aucun livre en cours.'); return; }
    prog = Math.max(0, prog-3.5); updateProg();
    say('Retour de trente secondes.'); return;
  }
  if (/avancer|avance/.test(cmd)) {
    if (!book) { say('Aucun livre en cours.'); return; }
    prog = Math.min(100, prog+3.5); updateProg();
    say('Avance de trente secondes.'); return;
  }
  if (/marque[- ]?page/.test(cmd))             { addBookmark(); return; }
  if (/mes marques|mes pages/.test(cmd))        { listBookmarks(); return; }
  if (/où|position|avancement|combien/.test(cmd)) { whereAmI(); return; }
  if (/plus vite|accélérer|accélère/.test(cmd)) { speedUp(); return; }
  if (/moins vite|ralentir|ralentis/.test(cmd)) { speedDown(); return; }
  if (/vitesse normale/.test(cmd))              { currentRate=1; say('Vitesse normale.'); return; }

  const slM = cmd.match(/arrêt dans (\d+)|(\d+) minutes/);
  if (slM) {
    const m = parseInt(slM[1]||slM[2]);
    if (m>0 && m<=120) { setSleep(m); return; }
  }
  if (/annuler minuterie/.test(cmd)) {
    clearTimeout(sleepTO); sleepTO=null;
    say('Minuterie annulée.'); return;
  }
  if (/aide|commandes|help/.test(cmd)) { sayHelp(); return; }

  // Tentative recherche si pas en lecture
  if (!playing && cmd.length > 2) {
    const found = searchBook(cmd) || searchByGenre(cmd);
    if (found) { proposeBook(found); return; }
  }

  say(`Je n'ai pas compris. Dites aide pour connaître les commandes.`);
}
