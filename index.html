<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>VocaBook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;background:#0A0A0A;color:#F5F5F0;
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;-webkit-tap-highlight-color:transparent;
}
#screen-start{
  position:fixed;inset:0;background:#0A0A0A;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:28px;padding:40px;cursor:pointer;z-index:999;
}
#screen-start .ico{font-size:110px;}
#screen-start h1{font-size:40px;font-weight:900;color:#D4A017;}
#screen-start p{font-size:20px;line-height:1.9;color:#F5F5F0;text-align:center;font-weight:600;}
#screen-start .hint{font-size:17px;color:#9A9A94;}
#screen-app{
  display:none;position:fixed;inset:0;
  flex-direction:column;align-items:center;
  justify-content:space-between;
  padding:44px 28px calc(env(safe-area-inset-bottom)+24px);
  text-align:center;
}
#banner{
  position:fixed;top:-130px;left:50%;transform:translateX(-50%);
  background:#1C1C1C;border:2px solid #D4A017;border-radius:16px;
  padding:16px 22px;font-size:18px;font-weight:700;color:#D4A017;
  z-index:9999;max-width:92%;text-align:center;
  transition:top 0.3s ease;line-height:1.6;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.95);
}
#banner.show{top:20px;}
#book-ico{
  width:160px;height:160px;background:#1C1C1C;
  border:3px solid #2A2A2A;border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:68px;transition:box-shadow 0.5s;flex-shrink:0;
}
#book-ico.pl{box-shadow:0 0 0 14px rgba(212,160,23,0.25),0 20px 60px rgba(0,0,0,0.6);}
#book-ttl{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:6px;padding:0 4px;}
#book-aut{font-size:15px;color:#9A9A94;margin-bottom:2px;}
#book-info{font-size:13px;color:#9A9A94;}
.pw{width:100%;}
.ptrack{height:14px;background:#2A2A2A;border-radius:7px;position:relative;}
.pfill{position:absolute;left:0;top:0;bottom:0;background:#D4A017;border-radius:7px;transition:width 0.5s;}
.pthumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#D4A017;border-radius:50%;box-shadow:0 0 0 4px #0A0A0A;}
#pinfo{display:flex;justify-content:space-between;margin-top:8px;font-size:14px;color:#9A9A94;font-weight:700;}
.gold{color:#D4A017;}
#mic-ring{
  width:120px;height:120px;border-radius:50%;
  background:#1C1C1C;border:4px solid #2A2A2A;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;transition:all 0.3s;flex-shrink:0;
}
#mic-ring.listening{border-color:#D4A017;animation:micpulse 1.4s infinite;}
#mic-ring.speaking{border-color:#D4A017;background:#D4A017;}
@keyframes micpulse{
  0%{box-shadow:0 0 0 0 rgba(212,160,23,0.6);}
  70%{box-shadow:0 0 0 22px rgba(212,160,23,0);}
  100%{box-shadow:0 0 0 0 rgba(212,160,23,0);}
}
#mic-label{font-size:15px;font-weight:700;color:#9A9A94;min-height:22px;text-align:center;}
</style>
</head>
<body>
<div id="banner" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="screen-start" role="button" aria-label="Toucher pour démarrer">
  <div class="ico">🎧</div>
  <h1>VocaBook</h1>
  <p>Bibliothèque vocale<br/>en français</p>
  <p class="hint">Poser le doigt n'importe où<br/>pour démarrer</p>
</div>
<div id="screen-app">
  <div id="book-ico">🎧</div>
  <div style="width:100%">
    <p id="book-ttl">VocaBook</p>
    <p id="book-aut">Bibliothèque vocale</p>
    <p id="book-info"></p>
  </div>
  <div class="pw">
    <div class="ptrack">
      <div class="pfill" id="pfill" style="width:0%"></div>
      <div class="pthumb" id="pthumb" style="left:0%"></div>
    </div>
    <div id="pinfo">
      <span id="p-el">--</span>
      <span class="gold" id="p-pct">0%</span>
      <span id="p-tot">--</span>
    </div>
  </div>
  <div id="mic-ring">🎤</div>
  <p id="mic-label">Initialisation…</p>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════
// CATALOGUE DE LIVRES FRANÇAIS — URLs Gutenberg directes
// ══════════════════════════════════════════════════════
const CATALOGUE = [
  { id:4650,  titre:'Le Petit Prince',           auteur:'Antoine de Saint-Exupéry', icone:'👑', mots:['petit prince','saint-exupéry','saint exupery'] },
  { id:17989, titre:'Les Misérables',             auteur:'Victor Hugo',              icone:'⚖️', mots:['misérables','victor hugo','hugo'] },
  { id:600,   titre:'Notre-Dame de Paris',        auteur:'Victor Hugo',              icone:'🏰', mots:['notre-dame','notre dame','hugo'] },
  { id:5097,  titre:'Madame Bovary',              auteur:'Gustave Flaubert',         icone:'🌹', mots:['bovary','flaubert'] },
  { id:4791,  titre:'Les Trois Mousquetaires',    auteur:'Alexandre Dumas',          icone:'⚔️', mots:['mousquetaires','dumas'] },
  { id:16205, titre:'Germinal',                   auteur:'Émile Zola',               icone:'⛏️', mots:['germinal','zola'] },
  { id:5788,  titre:'Voyage au centre de la Terre', auteur:'Jules Verne',            icone:'🌋', mots:['voyage','centre','terre','verne','jules'] },
  { id:800,   titre:'Le Tour du monde en 80 jours', auteur:'Jules Verne',            icone:'🌍', mots:['tour du monde','80 jours','verne','jules'] },
  { id:14564, titre:'Le Rouge et le Noir',         auteur:'Stendhal',                icone:'🔴', mots:['rouge','noir','stendhal'] },
  { id:14155, titre:'Candide',                     auteur:'Voltaire',                icone:'🌱', mots:['candide','voltaire'] },
  { id:6838,  titre:'Les Fleurs du Mal',           auteur:'Charles Baudelaire',      icone:'🌸', mots:['fleurs','mal','baudelaire'] },
  { id:4650,  titre:'Le Petit Prince',             auteur:'Antoine de Saint-Exupéry',icone:'👑', mots:['amour','romance','enfant'] },
  { id:4791,  titre:'Les Trois Mousquetaires',     auteur:'Alexandre Dumas',         icone:'⚔️', mots:['aventure','action','mousquet'] },
  { id:5788,  titre:'Voyage au centre de la Terre', auteur:'Jules Verne',            icone:'🌋', mots:['science','fantastique','science-fiction'] },
  { id:16205, titre:'Germinal',                    auteur:'Émile Zola',              icone:'⛏️', mots:['histoire','social','travail'] },
  { id:14155, titre:'Candide',                     auteur:'Voltaire',                icone:'🌱', mots:['philosophie','humour','satire'] },
  { id:5097,  titre:'Madame Bovary',               auteur:'Gustave Flaubert',        icone:'🌹', mots:['roman','femme','classique'] },
  { id:6838,  titre:'Les Fleurs du Mal',           auteur:'Charles Baudelaire',      icone:'🌸', mots:['poésie','poème','poete'] },
];

// Dédoublonne par ID
const LIVRES = [...new Map(CATALOGUE.map(l => [l.id, l])).values()];

function trouverLivre(cmd) {
  const q = cmd.toLowerCase();
  // Cherche dans les mots-clés
  for (const l of CATALOGUE) {
    if (l.mots.some(m => q.includes(m))) return l;
  }
  return null;
}

function listerLivres() {
  return LIVRES.map((l,i) => `${i+1}. ${l.titre} par ${l.auteur}`).join('. ');
}

// ══════════════════════════════════════════════════════
// VOIX
// ══════════════════════════════════════════════════════
let speaking    = false;
let currentRate = 1;

function say(text, onEnd) {
  const b = document.getElementById('banner');
  b.textContent = text.length > 75 ? text.slice(0,72)+'…' : text;
  b.classList.add('show');
  clearTimeout(say._bt);
  say._bt = setTimeout(() => b.classList.remove('show'), 7000);
  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();
  speaking = false;
  stopListening();
  setMicState('speaking');
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = currentRate; u.volume = 1;
    u.onend = () => { speaking=false; setMicState('idle'); if(onEnd) onEnd(); else startListening(); };
    u.onerror = () => { speaking=false; setMicState('idle'); if(onEnd) onEnd(); else startListening(); };
    speaking = true;
    window.speechSynthesis.speak(u);
    clearInterval(say._kp);
    say._kp = setInterval(() => {
      if (!speaking){clearInterval(say._kp);return;}
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 5000);
  }, 80);
}

// ══════════════════════════════════════════════════════
// LECTURE DU LIVRE PAR MORCEAUX
// ══════════════════════════════════════════════════════
let bookChunks  = [];
let chunkIndex  = 0;
let bookPlaying = false;
let bookmarks   = [];
let livreActuel = null;

const MOTS_PAR_CHUNK = 150;

function decouper(texte) {
  // Nettoie le texte Gutenberg
  let t = texte;
  // Supprime l'entête Gutenberg
  const debut = t.search(/\*\*\* ?START OF (THIS|THE) PROJECT/i);
  if (debut !== -1) {
    const finLigne = t.indexOf('\n', debut);
    t = t.slice(finLigne + 1);
  }
  // Supprime le pied Gutenberg
  const fin = t.search(/\*\*\* ?END OF (THIS|THE) PROJECT/i);
  if (fin !== -1) t = t.slice(0, fin);

  // Supprime les lignes qui ressemblent à des URLs ou métadonnées
  t = t.split('\n')
    .filter(line => {
      const l = line.trim();
      if (!l) return false;
      if (l.startsWith('http')) return false;
      if (l.match(/^(Title|Author|Release|Language|Character set|Produced|Updated|EBook):/i)) return false;
      return true;
    })
    .join(' ');

  // Nettoie les espaces multiples
  t = t.replace(/\s+/g, ' ').trim();

  // Découpe en morceaux de MOTS_PAR_CHUNK mots
  const mots = t.split(' ').filter(m => m.length > 0);
  const chunks = [];
  for (let i = 0; i < mots.length; i += MOTS_PAR_CHUNK) {
    chunks.push(mots.slice(i, i + MOTS_PAR_CHUNK).join(' '));
  }
  return chunks;
}

function lireChunk() {
  if (!bookPlaying || chunkIndex >= bookChunks.length) {
    if (chunkIndex >= bookChunks.length && bookChunks.length > 0) {
      bookPlaying = false;
      document.getElementById('book-ico').classList.remove('pl');
      say('La lecture est terminée. Bravo ! Dites nouveau livre pour en choisir un autre.',
        () => { convMode='ask_book'; });
    }
    return;
  }
  majProg();
  setMicState('speaking');
  const u = new SpeechSynthesisUtterance(bookChunks[chunkIndex]);
  u.lang = 'fr-FR'; u.rate = currentRate; u.volume = 1;
  u.onend = () => {
    if (bookPlaying) { chunkIndex++; majProg(); lireChunk(); }
    else { setMicState('idle'); startListening(); }
  };
  u.onerror = () => {
    if (bookPlaying) { chunkIndex++; lireChunk(); }
  };
  window.speechSynthesis.speak(u);
  // iOS keepalive
  clearInterval(say._kp);
  say._kp = setInterval(() => {
    if (!bookPlaying){clearInterval(say._kp);return;}
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);
}

function majProg() {
  if (!bookChunks.length) return;
  const pct = Math.round((chunkIndex / bookChunks.length) * 100);
  document.getElementById('pfill').style.width  = pct+'%';
  document.getElementById('pthumb').style.left  = pct+'%';
  document.getElementById('p-pct').textContent  = pct+'%';
  document.getElementById('p-el').textContent   = 'Partie '+(chunkIndex+1);
  document.getElementById('p-tot').textContent  = 'sur '+bookChunks.length;
}

function demarrerLecture() {
  bookPlaying = true;
  document.getElementById('book-ico').classList.add('pl');
  window.speechSynthesis.cancel();
  lireChunk();
}

function pauseLecture() {
  if (!bookPlaying) { say('Déjà en pause. Dites reprendre pour continuer.'); return; }
  bookPlaying = false;
  window.speechSynthesis.cancel();
  document.getElementById('book-ico').classList.remove('pl');
  setMicState('idle');
  setTimeout(() => startListening(), 300);
  say('Pause. Dites reprendre pour continuer.');
}

function reprendreLecture() {
  if (!bookChunks.length) { say('Aucun livre en cours. Dites un titre pour choisir un livre.'); return; }
  if (bookPlaying) { say('La lecture est déjà en cours.'); return; }
  bookPlaying = true;
  document.getElementById('book-ico').classList.add('pl');
  say('Reprise.', () => lireChunk());
}

// ══════════════════════════════════════════════════════
// MICRO CONTINU
// ══════════════════════════════════════════════════════
let recog     = null;
let listening = false;

function initRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setMicLabel('Micro non disponible'); return false; }
  recog = new SR();
  recog.lang='fr-FR'; recog.continuous=false; recog.interimResults=false; recog.maxAlternatives=3;
  recog.onstart = () => { listening=true; setMicState('listening'); setMicLabel('Je vous écoute…'); };
  recog.onend = () => {
    listening=false;
    if (bookPlaying) { lireChunk(); return; }
    if (!speaking) setTimeout(()=>{ if(!speaking && !bookPlaying) startListening(); },500);
  };
  recog.onerror = (e) => {
    listening=false;
    if (e.error==='no-speech'||e.error==='aborted') {
      if (bookPlaying){lireChunk();return;}
      if (!speaking) setTimeout(()=>startListening(),300);
      return;
    }
    setTimeout(()=>{ if(!speaking&&!bookPlaying) startListening(); },1000);
  };
  recog.onresult = (e) => {
    if (bookPlaying) { window.speechSynthesis.cancel(); bookPlaying=false; }
    const cmd = e.results[0][0].transcript.toLowerCase().trim();
    setMicLabel('« '+cmd+' »');
    handleCommand(cmd);
  };
  return true;
}

function startListening() {
  if (!recog||speaking||listening||bookPlaying) return;
  try { recog.start(); }
  catch(e){ setTimeout(()=>{ try{recog.start();}catch(e2){} },300); }
}
function stopListening() {
  if (!recog||!listening) return;
  try{recog.abort();}catch(e){}
  listening=false;
}
function setMicState(state) {
  const r=document.getElementById('mic-ring');
  r.classList.remove('listening','speaking');
  if (state==='listening'){r.classList.add('listening');setMicLabel('Je vous écoute…');}
  if (state==='speaking') {r.classList.add('speaking'); setMicLabel('Lecture en cours…');}
  if (state==='idle')     {setMicLabel('');}
}
function setMicLabel(t){document.getElementById('mic-label').textContent=t;}

// ══════════════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════════════
let convMode    = 'idle';
let pendingLivre = null;
let sleepTO      = null;

const SPEEDS=[0.5,0.75,1,1.25,1.5,1.75,2,2.5,3];
const SNAMES={0.5:'moitié de vitesse',0.75:'trois quarts',1:'vitesse normale',1.25:'un peu plus vite',1.5:'une fois et demie',1.75:'presque deux fois',2:'deux fois plus vite',2.5:'deux fois et demie',3:'trois fois plus vite'};

// ══════════════════════════════════════════════════════
// DÉMARRAGE
// ══════════════════════════════════════════════════════
document.getElementById('screen-start').addEventListener('click', function() {
  this.style.display='none';
  document.getElementById('screen-app').style.display='flex';
  initRecog();
  convMode='ask_book';
  say(
    'Bienvenue dans VocaBook. ' +
    'Quel livre voulez-vous écouter ? ' +
    'Dites le titre ou le nom de l\'auteur. ' +
    'Par exemple : Les Misérables, Victor Hugo, Jules Verne, Madame Bovary, Candide. ' +
    'Ou dites liste pour entendre tous les livres disponibles.'
  );
},{once:true});

// ══════════════════════════════════════════════════════
// CHARGER ET LIRE UN LIVRE
// ══════════════════════════════════════════════════════
async function chargerEtLire(livre) {
  livreActuel = livre;
  bookmarks   = [];
  chunkIndex  = 0;
  bookChunks  = [];
  convMode    = 'idle';

  document.getElementById('book-ico').textContent = livre.icone;
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = livre.titre;
  document.getElementById('book-aut').textContent = livre.auteur;
  document.getElementById('book-info').textContent= 'Chargement…';

  say(`Chargement de ${livre.titre}. Un instant.`, async () => {
    try {
      // URL directe Gutenberg texte UTF-8
      const urls = [
        `https://corsproxy.io/?${encodeURIComponent(`https://www.gutenberg.org/files/${livre.id}/${livre.id}-0.txt`)}`,
        `https://corsproxy.io/?${encodeURIComponent(`https://www.gutenberg.org/cache/epub/${livre.id}/pg${livre.id}.txt`)}`,
      ];

      let texte = '';
      for (const url of urls) {
        try {
          const r = await fetch(url);
          if (r.ok) {
            texte = await r.text();
            if (texte.length > 500) break;
          }
        } catch(e) { continue; }
      }

      if (!texte || texte.length < 500) {
        say(`Je n'ai pas pu charger ${livre.titre}. Dites un autre titre.`,
          () => { convMode='ask_book'; });
        return;
      }

      bookChunks = decouper(texte);

      if (!bookChunks.length) {
        say(`Problème avec le texte de ${livre.titre}. Dites un autre titre.`,
          () => { convMode='ask_book'; });
        return;
      }

      document.getElementById('book-info').textContent = bookChunks.length + ' parties';
      majProg();

      say(
        `${livre.titre} par ${livre.auteur} est prêt. ` +
        `La lecture commence maintenant. ` +
        `Dites pause pour mettre en pause. ` +
        `Dites marque-page pour sauvegarder votre position. ` +
        `Dites où en suis-je pour votre avancement.`,
        () => demarrerLecture()
      );

    } catch(e) {
      say('Erreur de connexion. Vérifiez internet et réessayez.',
        () => { convMode='ask_book'; });
    }
  });
}

function proposerLivre(livre) {
  pendingLivre = livre;
  convMode     = 'confirm_book';
  document.getElementById('book-ico').textContent = livre.icone;
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = livre.titre;
  document.getElementById('book-aut').textContent = livre.auteur;
  document.getElementById('book-info').textContent= '';
  say(
    `J'ai trouvé : ${livre.titre} par ${livre.auteur}. ` +
    `Dites oui pour écouter ce livre. Dites non pour chercher un autre.`
  );
}

function demanderLivre() {
  convMode = 'ask_book';
  bookPlaying = false;
  window.speechSynthesis.cancel();
  document.getElementById('book-ico').textContent='🎧';
  document.getElementById('book-ico').className='';
  document.getElementById('book-ttl').textContent='Quel livre ?';
  document.getElementById('book-aut').textContent='';
  document.getElementById('book-info').textContent='';
  say('Quel livre voulez-vous écouter ? Dites le titre ou le nom de l\'auteur. Ou dites liste pour tous les livres.');
}

// ══════════════════════════════════════════════════════
// MARQUE-PAGES
// ══════════════════════════════════════════════════════
function ajouterMarque() {
  if (!bookChunks.length){say('Aucun livre en cours.');return;}
  const n=bookmarks.length+1;
  const pct=Math.round((chunkIndex/bookChunks.length)*100);
  bookmarks.push({chunk:chunkIndex,n,pct});
  say(`Marque-page ${n} sauvegardé à ${pct} pourcent du livre.`);
}
function listerMarques() {
  if (!bookmarks.length){say('Aucun marque-page. Dites marque-page pendant la lecture.');return;}
  const liste=bookmarks.map(bm=>`Marque-page ${bm.n} à ${bm.pct} pourcent`).join('. ');
  say(`${bookmarks.length} marque-page${bookmarks.length>1?'s':''}. ${liste}. Dites reprendre marque-page 1 pour y retourner.`);
}
function allerMarque(n) {
  const bm=bookmarks.find(b=>b.n===n);
  if (!bm){say(`Marque-page ${n} introuvable.`);return;}
  chunkIndex=bm.chunk; majProg();
  say(`Reprise au marque-page ${n}, à ${bm.pct} pourcent.`,()=>demarrerLecture());
}

// ══════════════════════════════════════════════════════
// COMMANDES VOCALES
// ══════════════════════════════════════════════════════
function handleCommand(cmd) {

  // Marque-page numéroté
  const bmM=cmd.match(/(?:reprendre|aller).*marque[- ]?page\s*(\d+)/);
  if (bmM){allerMarque(parseInt(bmM[1]));return;}

  // Confirmation
  if (convMode==='confirm_book') {
    if (/^(oui|ok|yes|parfait|bien|super|d.accord|lancer|écouter|démarrer|vas-y|allez)/.test(cmd)){chargerEtLire(pendingLivre);return;}
    if (/^(non|pas|autre|différent|changer)/.test(cmd)){pendingLivre=null;demanderLivre();return;}
  }

  // Demande livre
  if (convMode==='ask_book') {
    if (/^(liste|tous les livres|quels livres)/.test(cmd)){
      say('Voici les livres disponibles. '+listerLivres()+'. Dites le titre que vous voulez écouter.');
      return;
    }
    if (cmd.length>2) {
      const livre=trouverLivre(cmd);
      if (livre){proposerLivre(livre);return;}
      say(`Je n'ai pas trouvé "${cmd}". Dites liste pour entendre tous les livres disponibles.`);
      return;
    }
  }

  // Commandes universelles
  if (/nouveau livre|autre livre|changer/.test(cmd)){demanderLivre();return;}
  if (/\bpause\b|^stop$|arrêter|arrête/.test(cmd)){pauseLecture();return;}
  if (/reprendre|continuer/.test(cmd)){reprendreLecture();return;}
  if (/reculer|recule|en arrière/.test(cmd)){
    chunkIndex=Math.max(0,chunkIndex-5); majProg();
    say('Retour en arrière.',()=>{if(bookPlaying)lireChunk();}); return;
  }
  if (/avancer|avance/.test(cmd)){
    chunkIndex=Math.min(bookChunks.length-1,chunkIndex+5); majProg();
    say('Avance.',()=>{if(bookPlaying)lireChunk();}); return;
  }
  if (/marque[- ]?page/.test(cmd)){ajouterMarque();return;}
  if (/mes marques|mes pages/.test(cmd)){listerMarques();return;}
  if (/où|position|avancement/.test(cmd)){
    if (!bookChunks.length){say('Aucun livre en cours.');return;}
    const pct=Math.round((chunkIndex/bookChunks.length)*100);
    say(`Vous êtes à ${pct} pourcent de ${livreActuel?.titre||'ce livre'}.`); return;
  }
  if (/plus vite|accélérer/.test(cmd)){
    const i=SPEEDS.indexOf(currentRate);
    if(i>=SPEEDS.length-1){say('Vitesse maximale.');return;}
    currentRate=SPEEDS[i+1]; say(`Vitesse : ${SNAMES[currentRate]}.`); return;
  }
  if (/moins vite|ralentir/.test(cmd)){
    const i=SPEEDS.indexOf(currentRate);
    if(i<=0){say('Vitesse minimale.');return;}
    currentRate=SPEEDS[i-1]; say(`Vitesse : ${SNAMES[currentRate]}.`); return;
  }
  if (/vitesse normale/.test(cmd)){currentRate=1;say('Vitesse normale.');return;}
  const slM=cmd.match(/arrêt dans (\d+)|(\d+) minutes/);
  if (slM){
    const m=parseInt(slM[1]||slM[2]);
    if(m>0&&m<=120){
      clearTimeout(sleepTO);
      sleepTO=setTimeout(()=>{
        bookPlaying=false; window.speechSynthesis.cancel();
        document.getElementById('book-ico').classList.remove('pl');
        say('Bonne nuit. La lecture s\'est arrêtée.');
      },m*60000);
      say(`Arrêt dans ${m} minutes. Bonne nuit.`); return;
    }
  }
  if (/annuler minuterie/.test(cmd)){clearTimeout(sleepTO);say('Minuterie annulée.');return;}
  if (/liste|tous les livres/.test(cmd)){say('Livres disponibles. '+listerLivres());return;}
  if (/aide|commandes|help/.test(cmd)){
    say(
      'Commandes : dites le titre ou l\'auteur pour choisir un livre. '+
      'Dites liste pour tous les livres. '+
      'Pendant la lecture : pause, reprendre, reculer, avancer, marque-page, mes marque-pages, où en suis-je, plus vite, moins vite. '+
      'Dites arrêt dans 30 minutes pour la minuterie. '+
      'Dites nouveau livre pour changer.'
    ); return;
  }

  // Tentative recherche
  if (!bookPlaying && cmd.length>2) {
    const livre=trouverLivre(cmd);
    if (livre){convMode='ask_book';proposerLivre(livre);return;}
  }

  say('Je n\'ai pas compris. Dites aide pour les commandes, ou liste pour les livres disponibles.');
}
</script>
