<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>VocaBook</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#0A0A0A; color:#F5F5F0;
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100dvh; overflow:hidden;
  display:flex; justify-content:center;
  user-select:none;
}
#app {
  width:100%; max-width:480px; height:100dvh;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
}

/* ── BANNER VOCAL ── */
#banner {
position:fixed; top:-90px; left:50%;
transform:translateX(-50%);
background:#1C1C1C; border:2px solid #D4A017;
border-radius:16px; padding:14px 24px;
font-size:17px; font-weight:700; color:#D4A017;
z-index:9999; max-width:90%; text-align:center;
transition:top 0.3s ease;
box-shadow:0 8px 32px rgba(0,0,0,0.9);
line-height:1.5;
}
#banner.show { top:20px; }

/* ── SCREENS ── */
.screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
.screen.on { display:flex; }

/* ══ ONBOARDING ══ */
#s-onboard {
justify-content:space-between;
align-items:center;
padding:60px 32px calc(env(safe-area-inset-bottom) + 110px);
text-align:center;
}
#onboard-icon { font-size:100px; }
#onboard-btn {
background:#D4A017; border-radius:24px;
width:100%; padding:30px 24px;
font-size:20px; font-weight:900; color:#000;
border:none; cursor:pointer;
min-height:96px;
}

/* ══ PLAYER ══ */
#s-player { justify-content:space-between; padding:20px 0 0; }
.player-top { padding:0 24px; text-align:center; }
#cover {
width:150px; height:150px;
background:#1C1C1C; border:3px solid #2A2A2A;
border-radius:28px; display:flex;
align-items:center; justify-content:center;
font-size:64px; margin:0 auto 16px;
transition:box-shadow 0.5s;
}
#cover.playing {
box-shadow:0 0 0 12px rgba(212,160,23,0.3), 0 20px 60px rgba(0,0,0,0.6);
}
#p-title {
font-size:20px; font-weight:900;
line-height:1.3; margin-bottom:6px; padding:0 8px;
}
#p-author { font-size:15px; color:#9A9A94; margin-bottom:4px; }
#p-dur { font-size:13px; color:#9A9A94; }

/* progress */
.prog-wrap { padding:16px 28px 8px; }
.prog-track {
height:16px; background:#2A2A2A; border-radius:8px;
position:relative; cursor:pointer;
}
.prog-fill {
position:absolute; left:0; top:0; bottom:0;
background:#D4A017; border-radius:8px;
transition:width 0.4s;
}
.prog-thumb {
position:absolute; top:50%;
transform:translate(-50%,-50%);
width:30px; height:30px;
background:#D4A017; border-radius:50%;
box-shadow:0 0 0 4px #0A0A0A;
}
#p-where {
background:none; border:none;
color:#D4A017; font-size:15px; font-weight:800;
width:100%; padding:10px 0; margin-top:4px;
cursor:pointer; font-family:inherit;
}

/* controls */
.ctrl-row {
display:flex; align-items:center;
justify-content:center; gap:14px;
padding:0 24px;
}
.side-btn {
flex:1; min-height:90px;
background:#1C1C1C; border:2px solid #2A2A2A;
border-radius:20px; display:flex;
flex-direction:column; align-items:center;
justify-content:center; gap:4px;
font-size:12px; font-weight:700; color:#9A9A94;
cursor:pointer;
}
#btn-pp {
width:136px; height:136px; flex-shrink:0;
background:#D4A017; border:none; border-radius:50%;
display:flex; align-items:center; justify-content:center;
cursor:pointer; transition:all 0.2s;
box-shadow:0 8px 30px rgba(212,160,23,0.5);
}
#btn-pp.playing {
box-shadow:0 0 0 14px rgba(212,160,23,0.3), 0 16px 50px rgba(212,160,23,0.5);
transform:scale(1.06);
}

/* action row */
.act-row {
display:flex; gap:10px;
padding:10px 20px 14px;
}
.act-btn {
flex:1; min-height:82px;
background:#1C1C1C; border:2px solid #2A2A2A;
border-radius:18px; display:flex;
flex-direction:column; align-items:center;
justify-content:center; gap:4px;
font-size:11px; font-weight:700; color:#9A9A94;
cursor:pointer; position:relative;
}
.act-btn.gold { background:#D4A017; border-color:#D4A017; color:#000; }
.act-btn .badge {
position:absolute; top:8px; right:8px;
background:#D4A017; color:#000;
border-radius:50%; width:22px; height:22px;
font-size:12px; font-weight:900;
display:flex; align-items:center; justify-content:center;
}

/* panel */
.panel {
position:absolute; bottom:0; left:0; right:0;
background:#141414; border-top:2px solid #2A2A2A;
border-radius:24px 24px 0 0; padding:20px 20px 32px;
z-index:300; max-height:60vh; overflow-y:auto;
box-shadow:0 -8px 40px rgba(0,0,0,0.95);
display:none;
}
.panel.show { display:block; }
.panel h3 { font-size:17px; font-weight:900; margin-bottom:16px; color:#F5F5F0; }
.spd-grid { display:flex; flex-wrap:wrap; gap:10px; }
.spd-btn {
background:#1C1C1C; border:2px solid #2A2A2A;
border-radius:14px; padding:14px 18px;
font-size:17px; font-weight:900; color:#F5F5F0;
min-width:64px; min-height:56px; cursor:pointer;
}
.spd-btn.sel { background:#D4A017; border-color:#D4A017; color:#000; }
.bm-item {
background:#1C1C1C; border:2px solid #2A2A2A;
border-radius:14px; padding:16px 18px;
font-size:16px; font-weight:700; color:#F5F5F0;
width:100%; text-align:left; cursor:pointer;
margin-bottom:8px; display:flex; align-items:center; gap:12px;
}

/* ══ LIBRARY — NAVIGATION VOCALE ══ */
#s-library {
justify-content:space-between;
align-items:center; padding:32px 24px;
text-align:center;
}
#lib-cover {
width:160px; height:160px;
background:#1C1C1C; border:3px solid #2A2A2A;
border-radius:28px; display:flex;
align-items:center; justify-content:center;
font-size:68px; margin:0 auto 20px;
}
#lib-title { font-size:22px; font-weight:900; line-height:1.3; margin-bottom:8px; }
#lib-author { font-size:16px; color:#9A9A94; margin-bottom:6px; }
#lib-dur { font-size:14px; color:#9A9A94; margin-bottom:24px; }
#lib-counter { font-size:14px; color:#9A9A94; margin-bottom:8px; }

.lib-nav-row {
display:flex; gap:12px; width:100%;
margin-bottom:16px;
}
.lib-arrow {
flex:1; min-height:100px;
background:#1C1C1C; border:2px solid #2A2A2A;
border-radius:20px; display:flex;
flex-direction:column; align-items:center;
justify-content:center; gap:6px;
font-size:13px; font-weight:800; color:#9A9A94;
cursor:pointer;
}
#lib-play {
width:100%; min-height:96px;
background:#D4A017; border:none;
border-radius:24px; font-size:20px;
font-weight:900; color:#000;
cursor:pointer; display:flex;
align-items:center; justify-content:center; gap:12px;
}
#lib-loading {
font-size:16px; color:#9A9A94;
padding:20px 0; text-align:center;
}

/* ══ NAV ══ */
nav {
display:flex; background:#141414;
border-top:2px solid #2A2A2A;
flex-shrink:0;
}
nav button {
flex:1; display:flex; flex-direction:column;
align-items:center; gap:5px; padding:12px 4px 10px;
background:transparent; color:#9A9A94;
font-size:10px; font-weight:500;
letter-spacing:0.06em; text-transform:uppercase;
border:none; cursor:pointer; min-height:64px;
}
nav button.on { color:#D4A017; font-weight:800; }
</style>

</head>
<body>
<div id="banner" role="status" aria-live="polite"></div>
<div id="app">

<!-- ONBOARDING -->

<div id="s-onboard" class="screen on">
  <div id="onboard-icon">🎧</div>
  <button id="onboard-btn">Toucher pour commencer</button>
</div>

<!-- PLAYER -->

<div id="s-player" class="screen">
  <div class="player-top">
    <div id="cover">🎧</div>
    <p id="p-title">Choisissez un livre</p>
    <p id="p-author"></p>
    <p id="p-dur"></p>
  </div>
  <div class="prog-wrap">
    <div class="prog-track" id="prog-track">

</div>

<!-- LIBRARY — NAVIGATION VOCALE UNIQUEMENT -->

<div id="s-library" class="screen">
  <div id="lib-loading">Chargement des livres…</div>

    <button id="lib-play">
      ▶  Écouter ce livre

</div>

<!-- NAV -->

<nav id="main-nav" style="display:none">
  <button id="nav-p" class="on" aria-label="Écouter">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>

  </button>

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
    <span>Livres</span>
  </button>

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Réglages</span>

</div>
<script>
// ══════════════════════════════════════════
// VOIX
// ══════════════════════════════════════════
let spk = false;
const Q = [];
function flush() {
  if (spk || !Q.length) return;
  spk = true;
  const {t,r,cb} = Q.shift();
  const u = new SpeechSynthesisUtterance(t);
  u.lang='fr-FR'; u.rate=r||1; u.volume=1;
  u.onend = () => { spk=false; cb&&cb(); flush(); };
  u.onerror = () => { spk=false; flush(); };
  speechSynthesis.speak(u);
}
function say(t,r,cb) {
  speechSynthesis.cancel(); Q.length=0; spk=false;
  Q.push({t,r:r||1,cb});
  flush();
  // banner
  const b=document.getElementById('banner');
  b.textContent = t.length>70 ? t.slice(0,67)+'…' : t;
  b.classList.add('show');
  clearTimeout(say._t);
  say._t = setTimeout(()=>b.classList.remove('show'), 4500);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function fmtS(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${String(m).padStart(2,'0')}min`:`${m}min`; }
function fmtL(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h} heure${h>1?'s':''} et ${m} minute${m!==1?'s':''}`:`${m} minute${m!==1?'s':''}`; }

const GICO={fiction:‘📖’,romance:‘💕’,adventure:‘⚔️’,mystery:‘🔍’,poetry:‘🌸’,history:‘🏛️’,philosophy:‘🧠’,science:‘🔬’,biography:‘👤’,drama:‘🎭’,humour:‘😄’};
function gico(g){ if(!g||!g.length) return ‘🎧’; const n=(g[0]?.name||’’).toLowerCase(); for(const[k,v] of Object.entries(GICO)) if(n.includes(k)) return v; return ‘🎧’; }

const SNAMES={0.5:‘moitié de vitesse’,0.75:‘trois quarts’,1:‘vitesse normale’,1.25:‘légèrement plus vite’,1.5:‘une fois et demie’,1.75:‘presque deux fois’,2:‘deux fois plus vite’,2.5:‘deux fois et demie’,3:‘trois fois plus vite’};
const SPEEDS=[0.5,0.75,1,1.25,1.5,1.75,2,2.5,3];

// ══════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════
let book=null, playing=false, prog=0, spd=1;
let sleepMin=null, sleepIdx=0, sleepTO=null;
let bookmarks=[], progIv=null;
let books=[], libIdx=0, libLoaded=false;

// ══════════════════════════════════════════
// ÉCRANS
// ══════════════════════════════════════════
function show(id){
document.querySelectorAll(’.screen’).forEach(s=>s.classList.remove(‘on’));
document.getElementById(‘s-’+id).classList.add(‘on’);
document.querySelectorAll(‘nav button’).forEach(b=>{b.classList.remove(‘on’);b.removeAttribute(‘aria-current’);});
const nm={‘player’:‘nav-p’,‘library’:‘nav-l’};
if(nm[id]){ document.getElementById(nm[id]).classList.add(‘on’); document.getElementById(nm[id]).setAttribute(‘aria-current’,‘page’); }
document.getElementById(‘main-nav’).style.display = id===‘onboard’?‘none’:‘flex’;
closePanels();
}
function closePanels(){
document.getElementById(‘spd-panel’).classList.remove(‘show’);
document.getElementById(‘bm-panel’).classList.remove(‘show’);
}

// ══════════════════════════════════════════
// ONBOARDING
// ══════════════════════════════════════════
const OB=[
{ico:‘🎧’, txt:‘Bonjour et bienvenue dans VocaBook. Je vais lire les livres pour vous à voix haute. Vous n'avez pas besoin de regarder l'écran. Touchez le grand bouton pour continuer.’},
{ico:‘🔊’, txt:‘Pour choisir un livre, touchez le bouton Livres en bas. Je vous lirai le titre et l'auteur. Touchez Précédent ou Suivant pour naviguer. Touchez Écouter pour démarrer. Touchez pour continuer.’},
{ico:‘📚’, txt:‘Vous avez accès à plus de vingt mille livres en français, gratuitement. Victor Hugo, Jules Verne, Émile Zola et bien d'autres. Touchez pour commencer.’},
];
let obStep=0;

document.getElementById(‘onboard-btn’).addEventListener(‘click’,()=>{
if(obStep < OB.length-1){
obStep++;
document.getElementById(‘onboard-icon’).textContent=OB[obStep].ico;
if(obStep===OB.length-1) document.getElementById(‘onboard-btn’).textContent=‘▶  Commencer’;
say(OB[obStep].txt);
} else {
show(‘library’);
loadLib();
}
});

// ══════════════════════════════════════════
// LIBRIVOX — CHARGEMENT
// ══════════════════════════════════════════
async function loadLib(){
if(libLoaded) { renderLib(); return; }
document.getElementById(‘lib-loading’).style.display=‘block’;
document.getElementById(‘lib-book’).style.display=‘none’;
say(‘Chargement des livres. Un instant.’);
try {
const url=‘https://corsproxy.io/?’+encodeURIComponent(‘https://librivox.org/api/feed/audiobooks/?language=french&limit=50&offset=0&format=json’);
const r=await fetch(url);
const d=await r.json();
books=(d.books||[]).map(b=>({
id:b.id,
title:(b.title||’’).trim()||‘Sans titre’,
author:(b.authors||[]).map(a=>`${a.first_name} ${a.last_name}`.trim()).join(’, ‘)||‘Auteur inconnu’,
secs:parseInt(b.totaltimesecs||0),
dur:b.totaltime||’’,
icon:gico(b.genres),
}));
libLoaded=true;
libIdx=0;
renderLib();
} catch(e) {
document.getElementById(‘lib-loading’).textContent=‘Erreur de connexion. Vérifiez internet.’;
say(‘Impossible de charger les livres. Vérifiez votre connexion internet.’);
}
}

function renderLib(){
if(!books.length) return;
const b=books[libIdx];
document.getElementById(‘lib-loading’).style.display=‘none’;
document.getElementById(‘lib-book’).style.display=‘block’;
document.getElementById(‘lib-cover’).textContent=b.icon;
document.getElementById(‘lib-title’).textContent=b.title;
document.getElementById(‘lib-author’).textContent=b.author;
document.getElementById(‘lib-dur’).textContent=b.dur ? ’⏱ ’+b.dur : ‘’;
document.getElementById(‘lib-counter’).textContent=`Livre ${libIdx+1} sur ${books.length}`;
}

// Navigation vocale — PAS DE TEXTE À TAPER
document.getElementById(‘btn-prev’).addEventListener(‘click’,()=>{
if(!books.length) return;
libIdx = libIdx<=0 ? books.length-1 : libIdx-1;
renderLib();
const b=books[libIdx];
say(`Livre ${libIdx+1} sur ${books.length}. ${b.title}, par ${b.author}. ${b.dur||fmtS(b.secs)}. Touchez Écouter pour lancer la lecture.`);
});

document.getElementById(‘btn-next’).addEventListener(‘click’,()=>{
if(!books.length) return;
libIdx = libIdx>=books.length-1 ? 0 : libIdx+1;
renderLib();
const b=books[libIdx];
say(`Livre ${libIdx+1} sur ${books.length}. ${b.title}, par ${b.author}. ${b.dur||fmtS(b.secs)}. Touchez Écouter pour lancer la lecture.`);
});

document.getElementById(‘lib-play’).addEventListener(‘click’,()=>{
if(!books.length) return;
playBook(books[libIdx]);
});

// ══════════════════════════════════════════
// PLAYER
// ══════════════════════════════════════════
function playBook(b){
book=b; prog=0; playing=false;
document.getElementById(‘cover’).textContent=b.icon;
document.getElementById(‘p-title’).textContent=b.title;
document.getElementById(‘p-author’).textContent=b.author;
document.getElementById(‘p-dur’).textContent=b.dur||fmtS(b.secs);
renderPP(); renderProg();
show(‘player’);
say(
`Vous avez choisi : ${b.title}, par ${b.author}. Durée : ${b.dur||fmtL(b.secs)}. `+
`La lecture commence maintenant. Touchez le grand bouton doré pour mettre en pause. `+
`Touchez à gauche pour reculer trente secondes. Touchez à droite pour avancer trente secondes.`,
1,
()=>{ playing=true; renderPP(); startProg(); }
);
}

function startProg(){
clearInterval(progIv);
progIv=setInterval(()=>{
if(!playing) return;
prog=Math.min(100,prog+0.04);
renderProg();
if(prog>=100){
playing=false; clearInterval(progIv); renderPP();
say(‘La lecture est terminée. Bravo ! Touchez le bouton Livres pour choisir un autre livre.’);
}
},300);
}

function renderProg(){
const p=Math.round(prog);
document.getElementById(‘prog-fill’).style.width=p+’%’;
document.getElementById(‘prog-thumb’).style.left=p+’%’;
}

function renderPP(){
const btn=document.getElementById(‘btn-pp’);
const ico=document.getElementById(‘pp-ico’);
document.getElementById(‘cover’).className=playing?‘playing’:’’;
if(playing){
btn.classList.add(‘playing’); btn.setAttribute(‘aria-label’,‘Mettre en pause’);
ico.innerHTML=’<rect x="6" y="4" width="4" height="16" rx="1" fill="#000"/><rect x="14" y="4" width="4" height="16" rx="1" fill="#000"/>’;
} else {
btn.classList.remove(‘playing’); btn.setAttribute(‘aria-label’,‘Reprendre la lecture’);
ico.innerHTML=’<polygon points="5,3 19,12 5,21" fill="#000"/>’;
}
}

document.getElementById(‘btn-pp’).addEventListener(‘click’,()=>{
if(!book){ say(‘Aucun livre sélectionné. Allez dans la bibliothèque pour choisir un livre.’); show(‘library’); loadLib(); return; }
playing=!playing; renderPP();
if(playing){ startProg(); say(`Lecture en cours. ${book.title}.`); }
else { clearInterval(progIv); say(‘Pause. Touchez le grand bouton pour reprendre.’); }
});

document.getElementById(‘btn-back’).addEventListener(‘click’,()=>{
prog=Math.max(0,prog-3.5); renderProg();
say(‘Retour de trente secondes.’);
});
document.getElementById(‘btn-fwd’).addEventListener(‘click’,()=>{
prog=Math.min(100,prog+3.5); renderProg();
say(‘Avance de trente secondes.’);
});
document.getElementById(‘p-where’).addEventListener(‘click’,()=>{
const s=Math.round((prog/100)*(book?.secs||0));
say(`Vous êtes à ${Math.round(prog)} pourcent du livre. ${fmtL(s)} écoutées.`);
});

// progress bar touch
document.getElementById(‘prog-track’).addEventListener(‘click’,e=>{
const r=e.currentTarget.getBoundingClientRect();
prog=Math.max(0,Math.min(100,Math.round(((e.clientX-r.left)/r.width)*100)));
renderProg();
const s=Math.round((prog/100)*(book?.secs||0));
say(`Position : ${fmtL(s)}.`);
});

// ── VITESSE ──
function buildSpeedGrid(){
const g=document.getElementById(‘spd-grid’); g.innerHTML=’’;
SPEEDS.forEach(s=>{
const b=document.createElement(‘button’);
b.className=‘spd-btn’+(s===spd?’ sel’:’’);
b.textContent=s+‘×’;
b.addEventListener(‘click’,()=>{
spd=s;
document.getElementById(‘spd-lbl’).textContent=s+‘×’;
document.getElementById(‘spd-panel’).classList.remove(‘show’);
say(`Vitesse : ${SNAMES[s]}.`);
});
g.appendChild(b);
});
}
document.getElementById(‘btn-spd’).addEventListener(‘click’,()=>{
const p=document.getElementById(‘spd-panel’);
const open=p.classList.toggle(‘show’);
document.getElementById(‘bm-panel’).classList.remove(‘show’);
if(open){ buildSpeedGrid(); say(`Vitesse actuelle : ${SNAMES[spd]}. Touchez une vitesse pour la changer.`); }
});

// ── MARQUE-PAGES ──
function updBadge(){
const b=document.getElementById(‘bm-badge’);
b.style.display=bookmarks.length?‘flex’:‘none’;
b.textContent=bookmarks.length;
}
document.getElementById(‘btn-mark’).addEventListener(‘click’,()=>{
if(!book){ say(‘Aucun livre en cours.’); return; }
const s=Math.round((prog/100)*(book.secs||0));
const n=bookmarks.length+1;
bookmarks.push({pct:Math.round(prog),secs:s,label:`Marque-page ${n} — ${fmtS(s)}`});
updBadge();
say(`Marque-page ${n} ajouté à ${fmtL(s)} dans ${book.title}.`);
});
document.getElementById(‘btn-bms’).addEventListener(‘click’,()=>{
if(!bookmarks.length){ say(‘Aucun marque-page. Touchez le bouton Marquer pendant la lecture pour en ajouter un.’); return; }
const p=document.getElementById(‘bm-panel’);
const open=p.classList.toggle(‘show’);
document.getElementById(‘spd-panel’).classList.remove(‘show’);
if(open){
const l=document.getElementById(‘bm-list’); l.innerHTML=’’;
bookmarks.forEach((bm,i)=>{
const b=document.createElement(‘button’);
b.className=‘bm-item’;
b.innerHTML=`<span style="color:#D4A017;font-size:20px">🔖</span> ${bm.label}`;
b.addEventListener(‘click’,()=>{
prog=bm.pct; renderProg();
p.classList.remove(‘show’);
say(`Reprise à ${fmtL(bm.secs)}.`,1,()=>{ playing=true; renderPP(); startProg(); });
});
l.appendChild(b);
});
const txt=bookmarks.map((b,i)=>`Marque-page ${i+1} : ${fmtL(b.secs)}`).join(’. ’);
say(`${bookmarks.length} marque-page${bookmarks.length>1?'s':''}. ${txt}. Touchez pour reprendre.`);
}
});

// ── SOMMEIL ──
const SLPS=[null,15,30,45,60];
document.getElementById(‘btn-slp’).addEventListener(‘click’,()=>{
sleepIdx=(sleepIdx+1)%SLPS.length;
sleepMin=SLPS[sleepIdx];
clearTimeout(sleepTO);
const lbl=document.getElementById(‘slp-lbl’);
const btn=document.getElementById(‘btn-slp’);
if(sleepMin){
lbl.textContent=sleepMin+‘min’; btn.classList.add(‘gold’);
sleepTO=setTimeout(()=>{
playing=false; renderPP(); clearInterval(progIv);
sleepMin=null; sleepIdx=0; lbl.textContent=‘Sommeil’; btn.classList.remove(‘gold’);
say(‘Bonne nuit. La lecture s'est arrêtée automatiquement.’);
},sleepMin*60000);
say(`Arrêt automatique dans ${sleepMin} minutes. Bonne nuit.`);
} else {
lbl.textContent=‘Sommeil’; btn.classList.remove(‘gold’);
say(‘Minuterie désactivée.’);
}
});

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
document.getElementById(‘nav-p’).addEventListener(‘click’,()=>{
show(‘player’);
say(book?`Lecteur. ${book.title}.`:‘Lecteur audio. Allez dans Livres pour choisir un livre.’);
});
document.getElementById(‘nav-l’).addEventListener(‘click’,()=>{
show(‘library’);
loadLib().then?.(()=>{}).catch?.(()=>{});
if(libLoaded && books.length){
const b=books[libIdx];
say(`Bibliothèque. Livre ${libIdx+1} sur ${books.length}. ${b.title}, par ${b.author}. Touchez Suivant ou Précédent pour naviguer. Touchez Écouter pour lancer.`);
} else {
say(‘Bibliothèque. Chargement des livres en cours.’);
}
});
document.getElementById(‘nav-s’).addEventListener(‘click’,()=>{
// Réglages inline vocal
say(‘Réglages. Touchez le bouton Vitesse dans le lecteur pour changer la vitesse. Touchez Répéter pour réécouter les instructions.’);
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
show(‘onboard’);
setTimeout(()=>say(OB[0].txt), 800);
</script>
