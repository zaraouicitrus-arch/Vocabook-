<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>VocaBook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;background:#0A0A0A;color:#F5F5F0;
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;-webkit-tap-highlight-color:transparent;
}

/* ÉCRAN DÉMARRAGE — TOUT L’ÉCRAN */
#screen-start{
position:fixed;inset:0;background:#0A0A0A;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
gap:28px;padding:40px;cursor:pointer;z-index:999;
}
#screen-start .ico{font-size:110px;}
#screen-start h1{font-size:40px;font-weight:900;color:#D4A017;}
#screen-start p{font-size:20px;line-height:1.9;color:#F5F5F0;text-align:center;font-weight:600;}
#screen-start .hint{font-size:17px;color:#9A9A94;}

/* APP */
#screen-app{
display:none;position:fixed;inset:0;
flex-direction:column;align-items:center;
justify-content:space-between;
padding:44px 28px calc(env(safe-area-inset-bottom)+24px);
text-align:center;
}

/* BANNIÈRE */
#banner{
position:fixed;top:-130px;left:50%;transform:translateX(-50%);
background:#1C1C1C;border:2px solid #D4A017;border-radius:16px;
padding:16px 22px;font-size:18px;font-weight:700;color:#D4A017;
z-index:9999;max-width:92%;text-align:center;
transition:top 0.3s ease;line-height:1.6;pointer-events:none;
box-shadow:0 8px 32px rgba(0,0,0,0.95);
}
#banner.show{top:20px;}

/* ICÔNE LIVRE */
#book-ico{
width:160px;height:160px;background:#1C1C1C;
border:3px solid #2A2A2A;border-radius:28px;
display:flex;align-items:center;justify-content:center;
font-size:68px;transition:box-shadow 0.5s;flex-shrink:0;
}
#book-ico.pl{
box-shadow:0 0 0 14px rgba(212,160,23,0.25),0 20px 60px rgba(0,0,0,0.6);
}
#book-ttl{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:6px;padding:0 4px;}
#book-aut{font-size:15px;color:#9A9A94;margin-bottom:2px;}
#book-info{font-size:13px;color:#9A9A94;}

/* PROGRESSION */
.pw{width:100%;}
.ptrack{height:14px;background:#2A2A2A;border-radius:7px;position:relative;}
.pfill{position:absolute;left:0;top:0;bottom:0;background:#D4A017;border-radius:7px;transition:width 0.5s;}
.pthumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#D4A017;border-radius:50%;box-shadow:0 0 0 4px #0A0A0A;}
#pinfo{display:flex;justify-content:space-between;margin-top:8px;font-size:14px;color:#9A9A94;font-weight:700;}
.gold{color:#D4A017;}

/* MICRO */
#mic-ring{
width:120px;height:120px;border-radius:50%;
background:#1C1C1C;border:4px solid #2A2A2A;
display:flex;align-items:center;justify-content:center;
font-size:48px;transition:all 0.3s;flex-shrink:0;
}
#mic-ring.listening{border-color:#D4A017;animation:micpulse 1.4s infinite;}
#mic-ring.speaking{border-color:#D4A017;background:#D4A017;}
@keyframes micpulse{
0%{box-shadow:0 0 0 0 rgba(212,160,23,0.6);}
70%{box-shadow:0 0 0 22px rgba(212,160,23,0);}
100%{box-shadow:0 0 0 0 rgba(212,160,23,0);}
}
#mic-label{font-size:15px;font-weight:700;color:#9A9A94;min-height:22px;text-align:center;}
</style>

</head>
<body>
<div id="banner" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- ÉCRAN DÉMARRAGE — TOUT L'ÉCRAN EST LE BOUTON -->

<div id="screen-start" role="button" aria-label="Toucher pour démarrer">
  <div class="ico">🎧</div>
  <h1>VocaBook</h1>
  <p>Bibliothèque vocale<br/>20 000 livres en français</p>
  <p class="hint">Poser le doigt n'importe où<br/>pour démarrer</p>
</div>

<!-- APP PRINCIPALE -->

<div id="screen-app">
  <div id="book-ico">🎧</div>
  <div style="width:100%">
    <p id="book-ttl">VocaBook</p>
    <p id="book-aut">Bibliothèque vocale</p>
    <p id="book-info"></p>
  </div>
  <div class="pw">
    <div class="ptrack">
      <div class="pfill" id="pfill" style="width:0%"></div>
      <div class="pthumb" id="pthumb" style="left:0%"></div>
    </div>
    <div id="pinfo">
      <span id="p-el">--</span>
      <span class="gold" id="p-pct">0%</span>
      <span id="p-tot">--</span>
    </div>
  </div>
  <div id="mic-ring">🎤</div>
  <p id="mic-label">Initialisation…</p>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════
// VOIX
// ══════════════════════════════════════════════
let speaking    = false;
let currentRate = 1;

function say(text, onEnd) {
  // Bannière
  const b = document.getElementById('banner');
  b.textContent = text.length > 75 ? text.slice(0,72)+'…' : text;
  b.classList.add('show');
  clearTimeout(say._bt);
  say._bt = setTimeout(() => b.classList.remove('show'), 7000);

  if (!window.speechSynthesis) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();
  speaking = false;
  stopListening();
  setMicState('speaking');

  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = currentRate; u.volume = 1;
    u.onend = () => {
      speaking = false;
      setMicState('idle');
      if (onEnd) onEnd();
      else startListening();
    };
    u.onerror = () => {
      speaking = false;
      setMicState('idle');
      if (onEnd) onEnd();
      else startListening();
    };
    speaking = true;
    window.speechSynthesis.speak(u);

    // iOS keepalive
    clearInterval(say._kp);
    say._kp = setInterval(() => {
      if (!speaking) { clearInterval(say._kp); return; }
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 5000);
  }, 80);
}

// ══════════════════════════════════════════════
// LECTURE DU LIVRE — par morceaux pour iOS
// ══════════════════════════════════════════════
let bookText      = '';     // texte complet du livre
let bookChunks    = [];     // morceaux de 200 mots
let chunkIndex    = 0;      // morceau en cours
let bookPlaying   = false;
let bookmarkPos   = 0;      // position en chunks

const CHUNK_SIZE  = 200;    // mots par morceau

function chunkText(text) {
  const words  = text.split(/\s+/).filter(w => w.length > 0);
  const chunks = [];
  for (let i = 0; i < words.length; i += CHUNK_SIZE) {
    chunks.push(words.slice(i, i + CHUNK_SIZE).join(' '));
  }
  return chunks;
}

function readChunk() {
  if (!bookPlaying || chunkIndex >= bookChunks.length) {
    if (chunkIndex >= bookChunks.length && bookChunks.length > 0) {
      bookPlaying = false;
      document.getElementById('book-ico').classList.remove('pl');
      say('La lecture est terminée. Bravo ! Dites nouveau livre pour en choisir un autre.',
        () => { convMode = 'ask_book'; });
    }
    return;
  }

  const chunk = bookChunks[chunkIndex];
  updateProg();
  setMicState('speaking');

  const u = new SpeechSynthesisUtterance(chunk);
  u.lang = 'fr-FR'; u.rate = currentRate; u.volume = 1;
  u.onend = () => {
    if (bookPlaying) {
      chunkIndex++;
      updateProg();
      readChunk();
    } else {
      setMicState('idle');
      startListening();
    }
  };
  u.onerror = () => {
    if (bookPlaying) {
      chunkIndex++;
      readChunk();
    }
  };
  window.speechSynthesis.speak(u);

  // iOS keepalive pendant la lecture
  clearInterval(say._kp);
  say._kp = setInterval(() => {
    if (!bookPlaying) { clearInterval(say._kp); return; }
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 5000);
}

function startBookReading() {
  bookPlaying = true;
  document.getElementById('book-ico').classList.add('pl');
  window.speechSynthesis.cancel();
  readChunk();
}

function pauseBookReading() {
  bookPlaying = false;
  window.speechSynthesis.cancel();
  document.getElementById('book-ico').classList.remove('pl');
  setMicState('idle');
  setTimeout(() => startListening(), 300);
  say('Pause. Dites reprendre pour continuer.');
}

function resumeBookReading() {
  if (bookChunks.length === 0) { say('Aucun livre en cours.'); return; }
  bookPlaying = true;
  document.getElementById('book-ico').classList.add('pl');
  say('Reprise de la lecture.', () => readChunk());
}

function updateProg() {
  if (!bookChunks.length) return;
  const pct = Math.round((chunkIndex / bookChunks.length) * 100);
  document.getElementById('pfill').style.width  = pct + '%';
  document.getElementById('pthumb').style.left  = pct + '%';
  document.getElementById('p-pct').textContent  = pct + '%';
  document.getElementById('p-el').textContent   = `Partie ${chunkIndex+1}`;
  document.getElementById('p-tot').textContent  = `sur ${bookChunks.length}`;
}

// ══════════════════════════════════════════════
// MICRO CONTINU
// ══════════════════════════════════════════════
let recog     = null;
let listening = false;

function initRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setMicLabel('Micro non disponible'); return false; }

  recog = new SR();
  recog.lang = 'fr-FR';
  recog.continuous = false;
  recog.interimResults = false;
  recog.maxAlternatives = 3;

  recog.onstart = () => {
    listening = true;
    setMicState('listening');
    setMicLabel('Je vous écoute…');
  };
  recog.onend = () => {
    listening = false;
    // Si on est en lecture, reprend la lecture
    if (bookPlaying) { readChunk(); return; }
    // Sinon relance l'écoute
    if (!speaking) setTimeout(() => { if (!speaking && !bookPlaying) startListening(); }, 500);
  };
  recog.onerror = (e) => {
    listening = false;
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (bookPlaying) { readChunk(); return; }
      if (!speaking) setTimeout(() => startListening(), 300);
      return;
    }
    setTimeout(() => { if (!speaking && !bookPlaying) startListening(); }, 1000);
  };
  recog.onresult = (e) => {
    // Si livre en lecture, met en pause pour traiter la commande
    if (bookPlaying) {
      window.speechSynthesis.cancel();
      bookPlaying = false;
    }
    const cmd = e.results[0][0].transcript.toLowerCase().trim();
    setMicLabel('« ' + cmd + ' »');
    handleCommand(cmd);
  };
  return true;
}

function startListening() {
  if (!recog || speaking || listening || bookPlaying) return;
  try { recog.start(); }
  catch(e) { setTimeout(() => { try { recog.start(); } catch(e2){} }, 300); }
}

function stopListening() {
  if (!recog || !listening) return;
  try { recog.abort(); } catch(e) {}
  listening = false;
}

function setMicState(state) {
  const r = document.getElementById('mic-ring');
  r.classList.remove('listening','speaking');
  if (state==='listening') { r.classList.add('listening'); setMicLabel('Je vous écoute…'); }
  if (state==='speaking')  { r.classList.add('speaking');  setMicLabel('Lecture en cours…'); }
  if (state==='idle')      { setMicLabel(''); }
}
function setMicLabel(t) { document.getElementById('mic-label').textContent = t; }

// ══════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════
let convMode    = 'idle'; // 'idle' | 'ask_book' | 'confirm_book'
let pendingBook = null;
let bookmarks   = [];

const SPEEDS = [0.5,0.75,1,1.25,1.5,1.75,2,2.5,3];
const SNAMES = {
  0.5:'moitié de vitesse',0.75:'trois quarts',1:'vitesse normale',
  1.25:'un peu plus vite',1.5:'une fois et demie',1.75:'presque deux fois',
  2:'deux fois plus vite',2.5:'deux fois et demie',3:'trois fois plus vite'
};

// ══════════════════════════════════════════════
// DÉMARRAGE — premier toucher
// ══════════════════════════════════════════════
document.getElementById('screen-start').addEventListener('click', function() {
  this.style.display = 'none';
  document.getElementById('screen-app').style.display = 'flex';
  initRecog();
  convMode = 'ask_book';
  say(
    'Bienvenue dans VocaBook. ' +
    'Quel livre voulez-vous écouter ? ' +
    'Dites le titre ou le nom de l\'auteur. ' +
    'Par exemple : Victor Hugo, ou Le Petit Prince, ou Émile Zola.'
  );
}, { once: true });

// ══════════════════════════════════════════════
// RECHERCHE GUTENBERG
// ══════════════════════════════════════════════
async function searchGutenberg(query) {
  setMicLabel('Recherche en cours…');
  try {
    // Recherche sur Gutenberg en français
    const url = `https://gutendex.com/books/?search=${encodeURIComponent(query)}&languages=fr`;
    const r   = await fetch(url);
    const d   = await r.json();
    const results = d.results || [];
    if (!results.length) return null;
    return results[0];
  } catch(e) {
    return null;
  }
}

async function loadBookText(gutenbergBook) {
  // Cherche le fichier texte en UTF-8
  const formats = gutenbergBook.formats || {};
  let textUrl = formats['text/plain; charset=utf-8']
             || formats['text/plain; charset=us-ascii']
             || formats['text/plain']
             || null;

  if (!textUrl) return null;

  // Passe par corsproxy pour éviter CORS
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(textUrl);
  try {
    const r = await fetch(proxyUrl);
    const text = await r.text();
    // Nettoie l'en-tête Gutenberg
    const start = text.indexOf('*** START OF');
    const end   = text.indexOf('*** END OF');
    if (start !== -1 && end !== -1) {
      return text.slice(start + text.indexOf('\n', start) + 1, end).trim();
    }
    return text.slice(0, 50000); // limite pour les gros livres
  } catch(e) {
    return null;
  }
}

// ══════════════════════════════════════════════
// PROPOSITION + CONFIRMATION
// ══════════════════════════════════════════════
function proposeBook(gBook) {
  pendingBook = gBook;
  convMode    = 'confirm_book';
  const title  = gBook.title || 'Sans titre';
  const author = (gBook.authors || []).map(a => a.name).join(', ') || 'Auteur inconnu';
  document.getElementById('book-ico').textContent = '📖';
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = title;
  document.getElementById('book-aut').textContent = author;
  document.getElementById('book-info').textContent = '';
  say(
    `J'ai trouvé : ${title}, par ${author}. ` +
    `Dites oui pour que je vous lise ce livre. ` +
    `Dites non pour chercher un autre.`
  );
}

function askWhatBook() {
  convMode = 'ask_book';
  bookPlaying = false;
  window.speechSynthesis.cancel();
  document.getElementById('book-ico').textContent = '🎧';
  document.getElementById('book-ico').className   = '';
  document.getElementById('book-ttl').textContent = 'Quel livre ?';
  document.getElementById('book-aut').textContent = '';
  document.getElementById('book-info').textContent = '';
  document.getElementById('pfill').style.width = '0%';
  document.getElementById('pthumb').style.left = '0%';
  document.getElementById('p-pct').textContent = '0%';
  document.getElementById('p-el').textContent  = '--';
  document.getElementById('p-tot').textContent = '--';
  say('Quel livre voulez-vous écouter ? Dites le titre ou le nom de l\'auteur.');
}

// ══════════════════════════════════════════════
// LANCER LA LECTURE
// ══════════════════════════════════════════════
async function startReading(gBook) {
  const title  = gBook.title || 'Sans titre';
  const author = (gBook.authors||[]).map(a=>a.name).join(', ')||'Auteur inconnu';
  convMode = 'idle';
  bookmarks = [];

  say(
    `Chargement du livre ${title}. Un instant.`,
    async () => {
      const text = await loadBookText(gBook);
      if (!text || text.length < 100) {
        say('Je n\'ai pas pu charger le texte de ce livre. Dites un autre titre pour réessayer.',
          () => { convMode = 'ask_book'; });
        return;
      }

      bookText   = text;
      bookChunks = chunkText(text);
      chunkIndex = 0;

      document.getElementById('book-ico').textContent = '📖';
      document.getElementById('book-ttl').textContent = title;
      document.getElementById('book-aut').textContent = author;
      document.getElementById('book-info').textContent = `${bookChunks.length} parties`;
      updateProg();

      say(
        `${title} par ${author}. La lecture commence. ` +
        `Dites pause pour mettre en pause. ` +
        `Dites marque-page pour sauvegarder. ` +
        `Dites où en suis-je pour votre position. ` +
        `Dites aide pour toutes les commandes.`,
        () => startBookReading()
      );
    }
  );
}

// ══════════════════════════════════════════════
// MARQUE-PAGES
// ══════════════════════════════════════════════
function addBookmark() {
  if (!bookChunks.length) { say('Aucun livre en cours.'); return; }
  const n = bookmarks.length + 1;
  bookmarks.push({ chunk: chunkIndex, n });
  const pct = Math.round((chunkIndex / bookChunks.length) * 100);
  say(`Marque-page ${n} sauvegardé à ${pct} pourcent du livre.`);
}

function listBookmarks() {
  if (!bookmarks.length) { say('Aucun marque-page. Dites marque-page pendant la lecture pour en créer un.'); return; }
  const liste = bookmarks.map(bm => {
    const pct = Math.round((bm.chunk / bookChunks.length) * 100);
    return `Marque-page ${bm.n} à ${pct} pourcent`;
  }).join('. ');
  say(`${bookmarks.length} marque-page${bookmarks.length>1?'s':''}. ${liste}. Dites reprendre marque-page 1 pour y retourner.`);
}

function gotoBookmark(n) {
  const bm = bookmarks.find(b => b.n === n);
  if (!bm) { say(`Marque-page ${n} introuvable.`); return; }
  chunkIndex = bm.chunk;
  const pct  = Math.round((chunkIndex / bookChunks.length) * 100);
  updateProg();
  say(`Reprise au marque-page ${n}, à ${pct} pourcent.`,
    () => startBookReading());
}

// ══════════════════════════════════════════════
// VITESSE / POSITION / MINUTERIE / AIDE
// ══════════════════════════════════════════════
function speedUp() {
  const i = SPEEDS.indexOf(currentRate);
  if (i >= SPEEDS.length-1) { say('Vitesse maximale.'); return; }
  currentRate = SPEEDS[i+1];
  say(`Vitesse : ${SNAMES[currentRate]}.`);
}
function speedDown() {
  const i = SPEEDS.indexOf(currentRate);
  if (i <= 0) { say('Vitesse minimale.'); return; }
  currentRate = SPEEDS[i-1];
  say(`Vitesse : ${SNAMES[currentRate]}.`);
}
function whereAmI() {
  if (!bookChunks.length) { say('Aucun livre en cours.'); return; }
  const pct   = Math.round((chunkIndex / bookChunks.length) * 100);
  const reste = bookChunks.length - chunkIndex;
  say(`Vous êtes à ${pct} pourcent du livre. Il reste ${reste} parties sur ${bookChunks.length}.`);
}

let sleepTO = null;
function setSleep(min) {
  clearTimeout(sleepTO);
  sleepTO = setTimeout(() => {
    bookPlaying = false;
    window.speechSynthesis.cancel();
    document.getElementById('book-ico').classList.remove('pl');
    say('Bonne nuit. La lecture s\'est arrêtée. Votre position est sauvegardée.');
  }, min * 60000);
  say(`Arrêt dans ${min} minutes. Bonne nuit.`);
}

function sayHelp() {
  say(
    'Commandes disponibles. ' +
    'Pour choisir un livre : dites le titre ou le nom de l\'auteur. ' +
    'Dites oui pour confirmer, non pour chercher un autre. ' +
    'Pendant la lecture : pause, reprendre, reculer, avancer, marque-page, mes marque-pages, où en suis-je, plus vite, moins vite. ' +
    'Dites arrêt dans 30 minutes pour la minuterie. ' +
    'Dites nouveau livre pour changer.'
  );
}

// ══════════════════════════════════════════════
// COMMANDES VOCALES
// ══════════════════════════════════════════════
function handleCommand(cmd) {

  // Marque-page numéroté
  const bmM = cmd.match(/(?:reprendre|aller).*marque[- ]?page\s*(\d+)/);
  if (bmM) { gotoBookmark(parseInt(bmM[1])); return; }

  // MODE CONFIRMATION
  if (convMode === 'confirm_book') {
    if (/^(oui|ok|yes|parfait|bien|super|d.accord|lancer|écouter|démarrer|vas-y|allez)/.test(cmd)) {
      startReading(pendingBook); return;
    }
    if (/^(non|pas|autre|différent|changer)/.test(cmd)) {
      pendingBook = null; askWhatBook(); return;
    }
  }

  // MODE DEMANDE LIVRE — recherche Gutenberg
  if (convMode === 'ask_book') {
    if (cmd.length > 2) {
      searchGutenberg(cmd).then(result => {
        if (result) { proposeBook(result); }
        else {
          say(`Je n'ai pas trouvé "${cmd}" sur Gutenberg. Essayez un autre titre ou auteur.`);
        }
      });
    }
    return;
  }

  // COMMANDES UNIVERSELLES
  if (/nouveau livre|autre livre|changer/.test(cmd))     { askWhatBook(); return; }
  if (/\bpause\b|^stop$|arrêter|arrête/.test(cmd))       { pauseBookReading(); return; }
  if (/reprendre|continuer/.test(cmd))                   { resumeBookReading(); return; }
  if (/reculer|recule/.test(cmd)) {
    chunkIndex = Math.max(0, chunkIndex - 3);
    updateProg();
    say('Retour en arrière.', () => { if(bookPlaying) readChunk(); }); return;
  }
  if (/avancer|avance/.test(cmd)) {
    chunkIndex = Math.min(bookChunks.length-1, chunkIndex + 3);
    updateProg();
    say('Avance.', () => { if(bookPlaying) readChunk(); }); return;
  }
  if (/marque[- ]?page/.test(cmd))               { addBookmark(); return; }
  if (/mes marques|mes pages/.test(cmd))          { listBookmarks(); return; }
  if (/où|position|avancement/.test(cmd))         { whereAmI(); return; }
  if (/plus vite|accélérer/.test(cmd))            { speedUp(); return; }
  if (/moins vite|ralentir/.test(cmd))            { speedDown(); return; }
  if (/vitesse normale/.test(cmd))                { currentRate=1; say('Vitesse normale.'); return; }

  const slM = cmd.match(/arrêt dans (\d+)|(\d+) minutes/);
  if (slM) { const m=parseInt(slM[1]||slM[2]); if(m>0&&m<=120){setSleep(m);return;} }
  if (/annuler minuterie/.test(cmd)) { clearTimeout(sleepTO); say('Minuterie annulée.'); return; }
  if (/aide|commandes|help/.test(cmd)) { sayHelp(); return; }

  // Tentative de recherche si rien d'autre
  if (!bookPlaying && cmd.length > 2) {
    convMode = 'ask_book';
    searchGutenberg(cmd).then(result => {
      if (result) proposeBook(result);
      else say('Je n\'ai pas compris. Dites aide pour les commandes.');
    });
    return;
  }

  say('Je n\'ai pas compris. Dites aide pour les commandes.');
}
</script>
